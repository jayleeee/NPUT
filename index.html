<!DOCTYPE html>
<html lang="ko">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NPUT — AI 사용자 테스트 관리</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
  <style>
    :root {
      --primary: #09AB49;
      --primary-light: #E8F9EF;
      --bg: #F6F8FA;
      --outline: #EDEFF2;
      --dark: #1A1A2E;
      --sub: #6B7280;
    }

    * {
      -webkit-font-smoothing: antialiased;
      box-sizing: border-box;
    }

    body {
      background: var(--bg);
      color: var(--dark);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
    }

    .primary-bg {
      background-color: var(--primary) !important;
    }

    .primary-text {
      color: var(--primary) !important;
    }

    .primary-border {
      border-color: var(--primary) !important;
    }

    .primary-light-bg {
      background-color: var(--primary-light) !important;
    }

    .bg-app {
      background-color: var(--bg);
    }

    .border-app {
      border-color: var(--outline);
    }

    .text-dark-app {
      color: var(--dark);
    }

    .text-sub-app {
      color: var(--sub);
    }

    input,
    textarea {
      outline: none;
    }

    input:focus,
    textarea:focus {
      box-shadow: 0 0 0 2px rgba(9, 171, 73, 0.3);
      border-color: var(--primary) !important;
    }

    .input-base {
      width: 100%;
      border: 1px solid var(--outline);
      border-radius: 12px;
      padding: 10px 16px;
      font-size: 14px;
      color: var(--dark);
      background: white;
      transition: all 0.15s;
    }

    .input-base::placeholder {
      color: var(--sub);
    }

    .btn-primary {
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-primary:hover {
      opacity: 0.88;
    }

    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .btn-outline {
      background: white;
      color: var(--sub);
      border: 1px solid var(--outline);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn-outline:hover {
      background: var(--bg);
      color: var(--dark);
    }

    .card {
      background: white;
      border: 1px solid var(--outline);
      border-radius: 16px;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 3px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 500;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .spin {
      animation: spin 0.8s linear infinite;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(20px);
      }

      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .slide-in {
      animation: slideIn 0.2s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fade-in {
      animation: fadeIn 0.2s ease-out;
    }

    ::-webkit-scrollbar {
      width: 5px;
      height: 5px;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--outline);
      border-radius: 99px;
    }

    .nav-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.15s;
      color: var(--sub);
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }

    .nav-link:hover {
      color: var(--dark);
      background: var(--bg);
    }

    .nav-link.active {
      color: var(--primary);
      background: var(--primary-light);
    }

    .tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      background: none;
      border: none;
      color: var(--sub);
    }

    .tab-btn:hover {
      color: var(--dark);
    }

    .tab-btn.active {
      background-color: var(--primary);
      color: white;
    }

    .pill-btn {
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      border: 1px solid var(--outline);
      background: white;
      color: var(--sub);
    }

    .pill-btn:hover {
      border-color: #9ca3af;
      color: var(--dark);
    }

    .pill-btn.selected {
      border-color: var(--primary);
      background: var(--primary-light);
      color: var(--primary);
    }

    .rating-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 10px 6px;
      border-radius: 12px;
      border: 2px solid var(--outline);
      cursor: pointer;
      transition: all 0.15s;
      background: white;
    }

    .rating-btn.good.selected {
      border-color: #22c55e;
      background: #f0fdf4;
      color: #15803d;
    }

    .rating-btn.moderate.selected {
      border-color: #eab308;
      background: #fefce8;
      color: #a16207;
    }

    .rating-btn.bad.selected {
      border-color: #f97316;
      background: #fff7ed;
      color: #c2410c;
    }

    .rating-btn.critical.selected {
      border-color: #ef4444;
      background: #fef2f2;
      color: #b91c1c;
    }

    .sub-tab-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      background: none;
      border: 1.5px solid var(--outline);
      color: var(--sub);
    }

    .sub-tab-btn:hover {
      color: var(--dark);
      border-color: var(--dark);
      background: var(--bg);
    }

    .sub-tab-btn.active {
      background: #2E343A;
      color: white;
      border-color: #2E343A;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(26, 26, 46, 0.45);
      z-index: 40;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .modal {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
    }

    .modal-sm {
      max-width: 400px;
    }

    .modal-md {
      max-width: 560px;
    }

    .modal-lg {
      max-width: 720px;
    }

    .drawer {
      position: fixed;
      right: 0;
      top: 0;
      height: 100%;
      width: 380px;
      background: white;
      z-index: 50;
      box-shadow: -10px 0 40px rgba(0, 0, 0, 0.12);
      display: flex;
      flex-direction: column;
    }

    .insight-card {
      border-radius: 14px;
      padding: 16px;
      border: 1px solid;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      background: white;
      border: 1px solid var(--outline);
      border-radius: 14px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.12);
      padding: 12px 16px;
      min-width: 260px;
      max-width: 360px;
    }

    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 80px 24px;
    }

    .empty-icon {
      width: 80px;
      height: 80px;
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-center: center;
      margin: 0 auto 20px;
      background: var(--primary-light);
    }

    .annotation-pin {
      position: absolute;
      transform: translate(-50%, -50%);
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--primary);
      color: white;
      font-size: 11px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      cursor: pointer;
      transition: transform 0.15s;
      z-index: 10;
    }

    .annotation-pin:hover {
      transform: translate(-50%, -50%) scale(1.25);
    }

    .annotation-tooltip {
      position: absolute;
      left: calc(100% + 8px);
      top: 0;
      width: 200px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.15);
      padding: 12px;
      z-index: 20;
      pointer-events: none;
      border: 1px solid var(--outline);
    }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 2;
      overflow: hidden;
    }

    .line-clamp-3 {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      -webkit-line-clamp: 3;
      overflow: hidden;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="text/babel" data-presets="react">
    const { useState, useEffect, useCallback, useMemo, useRef, createContext, useContext, useReducer } = React;

    // ============================================================
    // CONSTANTS & HELPERS
    // ============================================================
    const AUTH_CODE = 'paystudio';
    const STORAGE_KEY = 'ut-assistant-v1';
    // API 키는 서버(api/gemini.js)에서 환경변수로 관리됩니다.

    const uid = () => Math.random().toString(36).slice(2, 9);

    const AI_PERSONAS = [
      { id: 'p01', name: '김민준', ageGroup: '20대', gender: '남', job: '대학생', digitalLiteracy: '높음', memo: 'SNS 헤비유저, 앱에 익숙함' },
      { id: 'p02', name: '이서연', ageGroup: '20대', gender: '여', job: '직장인', digitalLiteracy: '보통', memo: 'IT 제품 관심 많음, 효율 중시' },
      { id: 'p03', name: '박지우', ageGroup: '30대', gender: '남', job: '개발자', digitalLiteracy: '높음', memo: 'UX에 민감하게 반응, 버그 발견 잘함' },
      { id: 'p04', name: '최수아', ageGroup: '30대', gender: '여', job: '주부', digitalLiteracy: '보통', memo: '모바일 주로 사용, 직관성 중시' },
      { id: 'p05', name: '정현우', ageGroup: '40대', gender: '남', job: '자영업자', digitalLiteracy: '보통', memo: '스마트폰 중간 수준 활용, 실용성 중시' },
      { id: 'p06', name: '강미영', ageGroup: '40대', gender: '여', job: '교사', digitalLiteracy: '보통', memo: '업무용 앱 위주 사용, 안정성 선호' },
      { id: 'p07', name: '윤성호', ageGroup: '50대 이상', gender: '남', job: '회사원', digitalLiteracy: '낮음', memo: '앱 사용에 다소 어려움, 설명 필요' },
      { id: 'p08', name: '한지원', ageGroup: '50대 이상', gender: '여', job: '자영업자', digitalLiteracy: '낮음', memo: '새 기능 학습 어려워함, 단순함 선호' },
      { id: 'p09', name: '오동현', ageGroup: '10대', gender: '남', job: '고등학생', digitalLiteracy: '높음', memo: '게임·영상 위주 사용, 빠른 반응 기대' },
      { id: 'p10', name: '임채원', ageGroup: '20대', gender: '여', job: '프리랜서 디자이너', digitalLiteracy: '높음', memo: '시각 디자인에 민감, 심미성 중시' },
    ];


    const fmt = (iso) => new Date(iso).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
    const fmtShort = (iso) => new Date(iso).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });

    // ============================================================
    // STORAGE
    // ============================================================
    // 인증 정보만 localStorage에 유지 (tests는 서버에서 관리)
    const loadAuth = () => {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
      catch { return {}; }
    };
    const saveAuth = (state) => {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch { }
    };

    // 이미지 압축 (Canvas API — max 1200px, JPEG 0.75)
    const compressImage = (file) => new Promise(resolve => {
      const reader = new FileReader();
      reader.onload = ev => {
        const img = new Image();
        img.onload = () => {
          const MAX = 1200;
          let { width: w, height: h } = img;
          if (w > MAX || h > MAX) {
            if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
            else       { w = Math.round(w * MAX / h); h = MAX; }
          }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          resolve(canvas.toDataURL('image/jpeg', 0.75));
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // 서버 데이터 API (Supabase 연동 시 api/tests.js 백엔드만 교체)
    const testsAPI = {
      fetch: () => fetch('/api/tests').then(r => {
        if (!r.ok) return r.json().then(e => { console.error('[testsAPI.fetch] error:', e); return []; });
        return r.json();
      }).catch(e => { console.error('[testsAPI.fetch] network error:', e); return []; }),
      upsert: (test) => fetch('/api/tests', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(test) }).then(r => {
        if (!r.ok) return r.json().then(e => { console.error('[testsAPI.upsert] error:', e); });
      }).catch(e => console.error('[testsAPI.upsert] network error:', e)),
      delete: (id) => fetch(`/api/tests?id=${id}`, { method: 'DELETE' }).then(r => {
        if (!r.ok) return r.json().then(e => { console.error('[testsAPI.delete] error:', e); });
      }).catch(e => console.error('[testsAPI.delete] network error:', e)),
    };

    // ============================================================
    // GLOBAL STATE (Context)
    // ============================================================
    const AppContext = createContext(null);

    function useApp() { return useContext(AppContext); }

    function AppProvider({ children }) {
      const saved = loadAuth();
      const [isAuth, setIsAuth] = useState(saved.isAuth || false);
      const [userName, setUserName] = useState(saved.userName || '');
      const [tests, setTests] = useState([]);
      const [testsLoading, setTestsLoading] = useState(false);
      const [toasts, setToasts] = useState([]);
      const [page, setPage] = useState(isAuth ? 'dashboard' : 'landing');
      const [testId, setTestId] = useState(null);

      useEffect(() => {
        saveAuth({ isAuth, userName });
      }, [isAuth, userName]);

      // 로그인 시 서버에서 테스트 목록 불러오기 + 30초 폴링
      useEffect(() => {
        if (!isAuth) { setTests([]); return; }
        setTestsLoading(true);
        testsAPI.fetch().then(data => { setTests(data || []); setTestsLoading(false); });
        const poll = setInterval(() => {
          testsAPI.fetch().then(data => { if (data) setTests(data); });
        }, 30000);
        return () => clearInterval(poll);
      }, [isAuth]);

      const login = (name, code) => {
        if (code === AUTH_CODE) { setIsAuth(true); setUserName(name); setPage('dashboard'); return true; }
        return false;
      };
      const logout = () => { setIsAuth(false); setUserName(''); setPage('landing'); setTests([]); };

      const addTest = (data) => {
        const t = { id: uid(), name: data.name, purpose: data.purpose, images: data.images || [], status: 'preparing', createdAt: new Date().toISOString(), createdBy: userName, testers: [] };
        setTests(prev => [t, ...prev]);
        testsAPI.upsert(t);
        return t;
      };

      const updateTest = (id, updates) => {
        setTests(prev => {
          const next = prev.map(t => t.id === id ? { ...t, ...updates } : t);
          const full = next.find(t => t.id === id);
          if (full) testsAPI.upsert(full);
          return next;
        });
      };

      const deleteTest = (id) => {
        setTests(prev => prev.filter(t => t.id !== id));
        testsAPI.delete(id);
      };

      const getTest = (id) => tests.find(t => t.id === id);

      const addTester = (testId, data) => {
        const tester = { id: uid(), ...data };
        setTests(prev => {
          const next = prev.map(t => t.id === testId ? { ...t, testers: [...t.testers, tester] } : t);
          const full = next.find(t => t.id === testId);
          if (full) testsAPI.upsert(full);
          return next;
        });
      };
      const updateTester = (testId, testerId, updates) => {
        setTests(prev => {
          const next = prev.map(t => t.id === testId ? { ...t, testers: t.testers.map(tr => tr.id === testerId ? { ...tr, ...updates } : tr) } : t);
          const full = next.find(t => t.id === testId);
          if (full) testsAPI.upsert(full);
          return next;
        });
      };
      const deleteTester = (testId, testerId) => {
        setTests(prev => {
          const next = prev.map(t => t.id === testId ? { ...t, testers: t.testers.filter(tr => tr.id !== testerId) } : t);
          const full = next.find(t => t.id === testId);
          if (full) testsAPI.upsert(full);
          return next;
        });
      };

      const toast = (type, msg) => {
        const id = uid();
        setToasts(prev => [...prev, { id, type, msg }]);
        setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
      };

      const navigate = (p, tid) => { setPage(p); if (tid) setTestId(tid); };

      return (
        <AppContext.Provider value={{ isAuth, userName, tests, testsLoading, toasts, testId, page, login, logout, addTest, updateTest, deleteTest, getTest, addTester, updateTester, deleteTester, toast, navigate }}>
          {children}
        </AppContext.Provider>
      );
    }

    // ============================================================
    // CLAUDE API
    // ============================================================
    async function callGemini(apiKey, system, content) {
      // API 키는 서버에서 처리 — apiKey 파라미터는 하위호환성을 위해 유지
      const res = await fetch('/api/gemini', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ system, content })
      });
      if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e?.error || `API 오류 ${res.status}`); }
      const data = await res.json();
      return data.text;
    }

    const parseJSON = (text) => {
      const cleaned = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
      return JSON.parse(cleaned);
    };

    const b64type = (b) => {
      if (b.includes('png')) return 'image/png';
      if (b.includes('gif')) return 'image/gif';
      if (b.includes('webp')) return 'image/webp';
      return 'image/jpeg';
    };
    const b64data = (b) => b.includes(',') ? b.split(',')[1] : b;

    const imgBlock = (b) => ({ type: 'image', source: { type: 'base64', media_type: b64type(b), data: b64data(b) } });

    async function apiGenerateGuide(key, purpose, images) {
      const sys = `당신은 UX 리서치 전문가입니다. 반드시 다음 JSON만 응답하세요:
{"opening":"오프닝 멘트(3-5문장)","questions":["질문1","질문2","질문3","질문4","질문5"],"closing":"클로징 멘트(2-3문장)"}
단계별 질문은 반드시 5개 이하로 작성하세요.`;
      const content = [
        { type: 'text', text: `테스트 목적: ${purpose}\n\n위 목적과 화면 이미지를 바탕으로 UT 진행 가이드를 작성해주세요.` },
        ...images.slice(0, 4).map(imgBlock)
      ];
      return parseJSON(await callGemini(key, sys, content));
    }

    async function apiGenerateScenarios(key, purpose, images) {
      const sys = `당신은 UX 리서치 전문가입니다. 반드시 다음 JSON만 응답하세요:
{"scenarios":["시나리오1","시나리오2","시나리오3"]}
시나리오는 반드시 3개만 작성하세요.`;
      const content = [

                  </div>
                  <h3 style={{ fontSize: 17, fontWeight: 700, color: 'var(--dark)', marginBottom: 8 }}>아직 테스트가 없어요</h3>
                  <p style={{ fontSize: 13, color: 'var(--sub)', maxWidth: 280, lineHeight: 1.6, marginBottom: 20 }}>첫 번째 사용자 테스트를 만들어보세요. AI가 가이드 작성부터 인사이트 분석까지 도와드립니다.</p>
                  <button className="btn-primary" onClick={() => setShowModal(true)}><Icon d={ICONS.plus} size={16} /> 첫 테스트 만들기</button>
                </div>
              </div>
            ) : (
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
                {tests.map(t => (
                  <div key={t.id} className="card" style={{ cursor: 'pointer', transition: 'all 0.15s', overflow: 'hidden' }}
                    onClick={() => navigate('test', t.id)}
                    onMouseEnter={e => { e.currentTarget.style.boxShadow = '0 4px 20px rgba(0,0,0,0.1)'; e.currentTarget.style.borderColor = 'var(--primary)'; }}
                    onMouseLeave={e => { e.currentTarget.style.boxShadow = ''; e.currentTarget.style.borderColor = 'var(--outline)'; }}>
                    <div style={{ height: 130, background: 'var(--bg)', overflow: 'hidden' }}>
                      {t.images.length > 0
                        ? <img src={t.images[0]} style={{ width: '100%', height: '100%', objectFit: 'cover', transition: 'transform 0.3s' }} alt="" onMouseEnter={e => e.target.style.transform = 'scale(1.05)'} onMouseLeave={e => e.target.style.transform = ''} />
                        : <div style={{ width: '100%', height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon d={ICONS.img} size={40} style={{ opacity: 0.2 }} /></div>}
                    </div>
                    <div style={{ padding: '14px 16px 16px' }}>
                      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 8 }}>
                        <p style={{ fontWeight: 700, fontSize: 14, color: 'var(--dark)', margin: 0, flex: 1, marginRight: 8 }} className="line-clamp-2">{t.name}</p>
                        <span className="tag" style={{ background: STATUS[t.status].bg, color: STATUS[t.status].color, flexShrink: 0, fontSize: 11 }}>{STATUS[t.status].label}</span>
                      </div>
                      <p style={{ fontSize: 12, color: 'var(--sub)', lineHeight: 1.5 }} className="line-clamp-2">{t.purpose}</p>
                      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', fontSize: 11, color: 'var(--sub)', marginTop: 12 }}>
                        <span>테스터 {t.testers.length}명</span>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                          {t.createdBy && <span style={{ background: 'var(--primary-light)', color: 'var(--primary)', borderRadius: 99, padding: '2px 8px', fontWeight: 600 }}>{t.createdBy}</span>}
                          <span>{fmt(t.createdAt)}</span>
                        </div>
                      </div>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          <Modal isOpen={showModal} onClose={() => { setShowModal(false); setName(''); setPurpose(''); setImages([]); }} title="새 테스트 만들기" size="md" closeOnBackdrop={false}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 18 }}>
              <div>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>테스트 이름 <span style={{ color: '#ef4444' }}>*</span></label>
                <input value={name} onChange={e => setName(e.target.value)} placeholder="예: 결제 플로우 사용성 테스트" className="input-base" />
              </div>
              <div>
                <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>테스트 목적 <span style={{ color: '#ef4444' }}>*</span></label>
                <textarea value={purpose} onChange={e => setPurpose(e.target.value)} placeholder="AI가 이를 바탕으로 가이드와 시나리오를 생성합니다." rows={4} className="input-base" style={{ resize: 'none' }} />
              </div>
              <div>
                <label style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>
                  <span>화면 이미지</span>
                  <span style={{ fontSize: 12, fontWeight: 400, color: images.length >= MAX_IMAGES ? '#ef4444' : 'var(--sub)' }}>{images.length} / {MAX_IMAGES}</span>
                </label>
                {images.length < MAX_IMAGES ? (
                  <div onClick={() => fileRef.current?.click()} style={{ border: '2px dashed var(--outline)', borderRadius: 12, padding: '24px 16px', cursor: 'pointer', transition: 'all 0.15s', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 4 }}
                    onMouseEnter={e => { e.currentTarget.style.borderColor = 'var(--primary)'; e.currentTarget.style.background = 'var(--primary-light)'; }}
                    onMouseLeave={e => { e.currentTarget.style.borderColor = 'var(--outline)'; e.currentTarget.style.background = ''; }}>
                    <Icon d={ICONS.img} size={28} style={{ color: 'var(--sub)' }} />
                    <p style={{ fontSize: 13, color: 'var(--sub)', margin: 0 }}>클릭하여 이미지 선택</p>
                    <p style={{ fontSize: 11, color: 'var(--sub)', margin: 0 }}>PNG, JPG · 최대 {MAX_IMAGES}개</p>
                  </div>
                ) : (
                  <div style={{ border: '2px dashed #fca5a5', borderRadius: 12, padding: '16px', textAlign: 'center', background: '#fff1f2' }}>
                    <p style={{ fontSize: 13, color: '#ef4444', margin: 0 }}>이미지 최대 개수({MAX_IMAGES}개)에 도달했습니다.</p>
                  </div>
                )}
                <input ref={fileRef} type="file" accept="image/*" multiple style={{ display: 'none' }} onChange={handleUpload} />
                {images.length > 0 && (
                  <div style={{ display: 'flex', gap: 8, marginTop: 10, flexWrap: 'wrap' }}>
                    {images.map((img, i) => (
                      <div key={i} style={{ position: 'relative' }}>
                        <img src={img} style={{ width: 60, height: 60, objectFit: 'cover', borderRadius: 8, border: '1px solid var(--outline)' }} />
                        <button onClick={() => setImages(prev => prev.filter((_, j) => j !== i))} style={{ position: 'absolute', top: -6, right: -6, width: 18, height: 18, borderRadius: '50%', background: '#ef4444', color: 'white', border: 'none', cursor: 'pointer', fontSize: 10, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>×</button>
                      </div>
                    ))}
                  </div>
                )}
                <div style={{ display: 'flex', alignItems: 'flex-start', gap: 6, marginTop: 8, padding: '8px 12px', background: '#fffbeb', border: '1px solid #fde68a', borderRadius: 8 }}>
                  <span style={{ fontSize: 12, color: '#92400e', lineHeight: 1.5 }}>💡 여러 안을 테스트할 경우 <strong>A/B/C/D 순서대로</strong> 업로드해 주세요. (파일명은 읽지 않습니다)</span>
                </div>
              </div>
              <div style={{ display: 'flex', gap: 10, paddingTop: 4 }}>
                <button onClick={() => { setShowModal(false); setName(''); setPurpose(''); setImages([]); }} className="btn-outline" style={{ flex: 1, justifyContent: 'center' }}>취소</button>
                <button onClick={create} className="btn-primary" style={{ flex: 1, justifyContent: 'center' }}>테스트 생성</button>
              </div>
            </div>
          </Modal>
        </Layout>
      );
    }

    // ============================================================
    // GUIDE TAB
    // ============================================================
    function fmtDate(iso) {
      const d = new Date(iso);
      return `${d.getFullYear()}.${String(d.getMonth() + 1).padStart(2, '0')}.${String(d.getDate()).padStart(2, '0')} ${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
    }

    function GuideTab({ test }) {
      const { updateTest, toast } = useApp();
      const [loadG, setLoadG] = useState(false);
      const [loadS, setLoadS] = useState(false);

      // 히스토리: 기존 test.guide가 있으면 마이그레이션
      const initHistory = () => {
        if (test.guideHistory && test.guideHistory.length > 0) return test.guideHistory;
        if (test.guide) return [{ id: uid(), createdAt: test.createdAt || new Date().toISOString(), guide: test.guide }];
        return [];
      };
      const [guideHistory, setGuideHistory] = useState(initHistory);
      const [expandedId, setExpandedId] = useState(initHistory()[0]?.id || null);
      const [editingId, setEditingId] = useState(null);
      const [editingGuide, setEditingGuide] = useState(null);

      const [scenarios, setScenarios] = useState(test.scenarios || []);
      const [editId, setEditId] = useState(null);
      const [editVal, setEditVal] = useState('');

      const genGuide = async () => {
        setLoadG(true);
        try {
          const r = await apiGenerateGuide(null, test.purpose, test.images);
          const entry = { id: uid(), createdAt: new Date().toISOString(), guide: r };
          const newHistory = [entry, ...guideHistory];
          setGuideHistory(newHistory);
          setExpandedId(entry.id);
          setEditingId(null); setEditingGuide(null);
          updateTest(test.id, { guideHistory: newHistory });
          toast('success', 'AI 가이드가 생성되었습니다.');
        } catch (e) { toast('error', e.message); } finally { setLoadG(false); }
      };

      const deleteGuideEntry = (entryId) => {
        const updated = guideHistory.filter(h => h.id !== entryId);
        setGuideHistory(updated);
        if (expandedId === entryId) setExpandedId(updated[0]?.id || null);
        if (editingId === entryId) { setEditingId(null); setEditingGuide(null); }
        updateTest(test.id, { guideHistory: updated });
        toast('info', '가이드가 삭제되었습니다.');
      };

      const startEdit = (entry) => {
        setEditingId(entry.id);
        setEditingGuide({ ...entry.guide, questions: [...entry.guide.questions] });
      };

      const saveEdit = () => {
        const updated = guideHistory.map(h => h.id === editingId ? { ...h, guide: editingGuide } : h);
        setGuideHistory(updated);
        updateTest(test.id, { guideHistory: updated });
        setEditingId(null); setEditingGuide(null);
        toast('success', '가이드가 저장되었습니다.');
      };

      const genScenarios = async () => {
        setLoadS(true);
        try {
          const r = await apiGenerateScenarios(null, test.purpose, test.images);
          const sc = r.slice(0, 3).map((c, i) => ({ id: uid(), order: i + 1, content: c }));
          setScenarios(sc); updateTest(test.id, { scenarios: sc });
          toast('success', 'AI 시나리오가 생성되었습니다.');
        } catch (e) { toast('error', e.message); } finally { setLoadS(false); }
      };

      const addScenario = () => {
        const s = { id: uid(), order: scenarios.length + 1, content: '새 시나리오를 작성해주세요.' };
        const updated = [...scenarios, s]; setScenarios(updated); updateTest(test.id, { scenarios: updated });
        setEditId(s.id); setEditVal(s.content);
      };
      const delScenario = (id) => {
        const updated = scenarios.filter(s => s.id !== id).map((s, i) => ({ ...s, order: i + 1 }));
        setScenarios(updated); updateTest(test.id, { scenarios: updated });
      };
      const saveScenario = (id) => {
        const updated = scenarios.map(s => s.id === id ? { ...s, content: editVal } : s);
        setScenarios(updated); updateTest(test.id, { scenarios: updated }); setEditId(null);
      };

      const renderGuideContent = (entry) => {
        const isEditing = editingId === entry.id;
        const g = isEditing ? editingGuide : entry.guide;
        return (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20, paddingTop: 20, borderTop: '1px solid var(--outline)' }}>
            <div>
              <label style={{ display: 'block', fontSize: 11, fontWeight: 700, color: 'var(--sub)', letterSpacing: '0.08em', marginBottom: 8, textTransform: 'uppercase' }}>오프닝 멘트</label>
              {isEditing
                ? <textarea value={g.opening} onChange={e => setEditingGuide({ ...g, opening: e.target.value })} rows={3} className="input-base" style={{ resize: 'none' }} />
                : <p style={{ fontSize: 14, color: 'var(--dark)', lineHeight: 1.7, margin: 0, padding: '12px 14px', background: 'var(--bg)', borderRadius: 10 }}>{g.opening}</p>}
            </div>
            <div>
              <label style={{ display: 'block', fontSize: 11, fontWeight: 700, color: 'var(--sub)', letterSpacing: '0.08em', marginBottom: 8, textTransform: 'uppercase' }}>단계별 질문 ({g.questions.length}개 / 최대 5개)</label>
              <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                {g.questions.map((q, i) => (
                  <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                    <span className="primary-light-bg primary-text" style={{ width: 24, height: 24, borderRadius: '50%', fontSize: 11, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: isEditing ? 8 : 4 }}>{i + 1}</span>
                    {isEditing
                      ? <>
                        <textarea value={q} onChange={e => { const qs = [...g.questions]; qs[i] = e.target.value; setEditingGuide({ ...g, questions: qs }); }} rows={2} className="input-base" style={{ resize: 'none', flex: 1 }} />
                        <button onClick={() => setEditingGuide({ ...g, questions: g.questions.filter((_, j) => j !== i) })} style={{ padding: 6, marginTop: 6, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}><Icon d={ICONS.x} size={14} /></button>
                      </>
                      : <p style={{ fontSize: 14, color: 'var(--dark)', flex: 1, lineHeight: 1.6, margin: 0, padding: '8px 0' }}>{q}</p>}
                  </div>
                ))}
                {isEditing && g.questions.length < 5 && (
                  <button onClick={() => setEditingGuide({ ...g, questions: [...g.questions, ''] })} style={{ display: 'flex', alignItems: 'center', gap: 4, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 13, fontWeight: 600, marginLeft: 32, padding: 4 }}>
                    <Icon d={ICONS.plus} size={14} /> 질문 추가
                  </button>
                )}
              </div>
            </div>
            <div>
              <label style={{ display: 'block', fontSize: 11, fontWeight: 700, color: 'var(--sub)', letterSpacing: '0.08em', marginBottom: 8, textTransform: 'uppercase' }}>클로징 멘트</label>
              {isEditing
                ? <textarea value={g.closing} onChange={e => setEditingGuide({ ...g, closing: e.target.value })} rows={2} className="input-base" style={{ resize: 'none' }} />
                : <p style={{ fontSize: 14, color: 'var(--dark)', lineHeight: 1.7, margin: 0, padding: '12px 14px', background: 'var(--bg)', borderRadius: 10 }}>{g.closing}</p>}
            </div>
            <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
              {isEditing
                ? <>
                  <button onClick={() => { setEditingId(null); setEditingGuide(null); }} className="btn-outline" style={{ fontSize: 13 }}>취소</button>
                  <button onClick={saveEdit} className="btn-primary" style={{ fontSize: 13 }}>저장</button>
                </>
                : <button onClick={() => startEdit(entry)} className="btn-outline" style={{ fontSize: 13 }}><Icon d={ICONS.edit} size={13} /> 수정</button>}
            </div>
          </div>
        );
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          {/* Guide */}
          <div className="card" style={{ padding: 24 }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: guideHistory.length > 0 ? 16 : 0 }}>
              <div>
                <h3 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 4px' }}>진행 가이드</h3>
                <p style={{ fontSize: 13, color: 'var(--sub)', margin: 0 }}>오프닝 / 단계별 질문(최대 5개) / 클로징 스크립트</p>
              </div>
              <button onClick={genGuide} disabled={loadG} className="btn-primary">
                {loadG ? <Spinner size={14} /> : <Icon d={ICONS.bolt} size={14} />}
                {guideHistory.length > 0 ? 'AI 재생성' : 'AI 가이드 생성'}
              </button>
            </div>

            {loadG ? <LoadingCard msg="AI가 가이드를 작성 중입니다..." /> : guideHistory.length === 0 ? (
              <div style={{ textAlign: 'center', padding: '40px 0' }}>
                <div className="primary-light-bg" style={{ width: 56, height: 56, borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 12px' }}>
                  <Icon d={ICONS.doc} size={26} className="primary-text" />
                </div>
                <p style={{ fontSize: 13, color: 'var(--sub)' }}>AI 가이드 생성 버튼을 눌러 진행 스크립트를 자동으로 만들어보세요.</p>
              </div>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {guideHistory.map((entry, idx) => (
                  <div key={entry.id} style={{ border: '1px solid var(--outline)', borderRadius: 14, padding: '14px 18px', background: idx === 0 ? 'white' : 'var(--bg)' }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer' }} onClick={() => setExpandedId(expandedId === entry.id ? null : entry.id)}>
                        <span style={{ fontSize: 12, color: expandedId === entry.id ? 'var(--primary)' : 'var(--sub)', transition: 'transform 0.2s', display: 'inline-block', transform: expandedId === entry.id ? 'rotate(180deg)' : 'rotate(0deg)' }}>▼</span>
                        <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--dark)' }}>{fmtDate(entry.createdAt)}</span>
                        {idx === 0 && <span style={{ fontSize: 11, fontWeight: 700, background: 'var(--primary-light)', color: 'var(--primary)', padding: '2px 8px', borderRadius: 999 }}>최신</span>}
                      </div>
                      <button onClick={() => deleteGuideEntry(entry.id)} style={{ padding: 6, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}
                        onMouseEnter={e => e.currentTarget.style.color = '#ef4444'} onMouseLeave={e => e.currentTarget.style.color = 'var(--sub)'}>
                        <Icon d={ICONS.trash} size={14} />
                      </button>
                    </div>
                    {expandedId === entry.id && renderGuideContent(entry)}
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* Scenarios */}
          <div className="card" style={{ padding: 24 }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 20 }}>
              <div>
                <h3 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 4px' }}>Task 시나리오</h3>
                <p style={{ fontSize: 13, color: 'var(--sub)', margin: 0 }}>테스터에게 제시할 단계별 과제</p>
              </div>
              <div style={{ display: 'flex', gap: 8 }}>
                <button onClick={genScenarios} disabled={loadS} style={{ border: '1.5px solid var(--primary)', color: 'var(--primary)', background: 'white', borderRadius: 10, padding: '8px 14px', fontSize: 13, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, opacity: loadS ? 0.5 : 1 }}>
                  {loadS ? <Spinner size={13} /> : <Icon d={ICONS.bolt} size={13} />} AI 초안 생성
                </button>
                <button onClick={addScenario} className="btn-outline" style={{ fontSize: 13 }}><Icon d={ICONS.plus} size={13} /> 직접 추가</button>
              </div>
            </div>
            {loadS ? <LoadingCard msg="AI가 시나리오를 작성 중입니다..." /> : scenarios.length === 0 ? (
              <p style={{ textAlign: 'center', color: 'var(--sub)', fontSize: 13, padding: '32px 0' }}>시나리오가 없습니다. AI 초안 생성 또는 직접 추가 버튼을 눌러주세요.</p>
            ) : (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {scenarios.map(s => (
                  <div key={s.id} style={{ border: '1px solid var(--outline)', borderRadius: 12, padding: 16 }}>
                    {editId === s.id ? (
                      <div>
                        <textarea value={editVal} onChange={e => setEditVal(e.target.value)} rows={3} className="input-base" style={{ resize: 'none', marginBottom: 8 }} autoFocus />
                        <div style={{ display: 'flex', gap: 6 }}>
                          <button onClick={() => saveScenario(s.id)} className="btn-primary" style={{ padding: '6px 14px', fontSize: 12 }}>저장</button>
                          <button onClick={() => setEditId(null)} className="btn-outline" style={{ padding: '6px 14px', fontSize: 12 }}>취소</button>
                        </div>
                      </div>
                    ) : (
                      <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }} className="group">
                        <span className="primary-bg" style={{ width: 28, height: 28, borderRadius: '50%', color: 'white', fontSize: 12, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{s.order}</span>
                        <p style={{ fontSize: 14, color: 'var(--dark)', flex: 1, lineHeight: 1.6, margin: 0 }}>{s.content}</p>
                        <div style={{ display: 'flex', gap: 4 }}>
                          <button onClick={() => { setEditId(s.id); setEditVal(s.content); }} style={{ padding: 5, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}><Icon d={ICONS.edit} size={13} /></button>
                          <button onClick={() => delScenario(s.id)} style={{ padding: 5, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}><Icon d={ICONS.trash} size={13} /></button>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            )}
          </div>
        </div>
      );
    }

    function DField({ label, req, children }) {
      return <div><label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 7 }}>{label}{req && <span style={{ color: '#ef4444', marginLeft: 2 }}>*</span>}</label>{children}</div>;
    }

    // ============================================================
    // TEST TAB (테스터 목록 + 테스트 결과 통합)
    // ============================================================
    const AGE_GROUPS = ['10대', '20대', '30대', '40대', '50대 이상'];
    const GENDERS = ['남', '여'];
    const LITERACY = ['낮음', '보통', '높음'];
    const LIT_STYLE = { 낮음: { bg: '#fee2e2', color: '#b91c1c' }, 보통: { bg: '#fef3c7', color: '#92400e' }, 높음: { bg: '#dcfce7', color: '#15803d' } };
    const RATING_STYLE = {
      good: { bg: '#dcfce7', color: '#15803d', label: '좋음', emoji: '🟢' },
      moderate: { bg: '#fef9c3', color: '#a16207', label: '보통', emoji: '🟡' },
      bad: { bg: '#fff7ed', color: '#c2410c', label: '나쁨', emoji: '🟠' },
      critical: { bg: '#fee2e2', color: '#b91c1c', label: '심각', emoji: '🔴' },
      neutral: { bg: '#fef9c3', color: '#a16207', label: '보통', emoji: '🟡' }, // 레거시 호환
    };
    const CAT_ICONS = { '내비게이션': '🧭', 'CTA': '🎯', '온보딩': '🚀', '폼': '📝', '피드백': '💬', '모달': '🪟', '정보구조': '🗂️', '시각디자인': '🎨', '인터랙션': '👆' };

    const randomTesterName = () => `테스터${Math.floor(Math.random() * 90 + 10)}`;
    const testerThumb = (name) => { const m = name.match(/\d+/); return m ? m[0] : name.slice(0, 2); };
    const EMPTY_FORM = () => ({ name: randomTesterName(), ageGroup: '30대', gender: '여', job: '', digitalLiteracy: '보통', rating: 'moderate', resultNotes: '' });

    // ============================================================
    // SHARED: TestResultCard
    // ============================================================
    function TestResultCard({ result, source, editable, onSave }) {
      const [editing, setEditing] = useState(false);
      const [draft, setDraft] = useState({ rating: 'moderate', notes: '' });

      const startEdit = () => {
        setDraft(result ? { rating: result.rating || 'moderate', notes: result.notes || '' } : { rating: 'moderate', notes: '' });
        setEditing(true);
      };

      const srcStyle = source === 'ai'
        ? { bg: '#ede9fe', color: '#6d28d9', label: 'AI 가상' }
        : { bg: '#dbeafe', color: '#1d4ed8', label: '직접 테스트' };

      if (editable && editing) {
        const RATINGS = ['good', 'moderate', 'bad', 'critical'];
        return (
          <div style={{ paddingTop: 14 }}>
            <p style={{ fontSize: 12, fontWeight: 700, color: 'var(--sub)', marginBottom: 8, letterSpacing: '0.06em' }}>전반적인 평가</p>
            <div style={{ display: 'flex', gap: 8, marginBottom: 14 }}>
              {RATINGS.map(v => {
                const s = RATING_STYLE[v];
                return (
                  <button key={v} onClick={() => setDraft({ ...draft, rating: v })}
                    className={`rating-btn ${v} ${draft.rating === v ? 'selected' : ''}`}
                    style={{ flex: 1, minWidth: 0 }}>
                    <span style={{ fontSize: 18 }}>{s.emoji}</span>
                    <span style={{ fontSize: 11, fontWeight: 700 }}>{s.label}</span>
                  </button>
                );
              })}
            </div>
            <p style={{ fontSize: 12, fontWeight: 700, color: 'var(--sub)', marginBottom: 6, letterSpacing: '0.06em' }}>메모</p>
            <textarea value={draft.notes} onChange={e => setDraft({ ...draft, notes: e.target.value })}
              placeholder="발화 기록, 관찰 내용, 특이사항 등을 자유롭게 기록하세요"
              rows={5} className="input-base" style={{ resize: 'none', marginBottom: 10 }} autoFocus />
            <div style={{ display: 'flex', gap: 8 }}>
              <button onClick={() => setEditing(false)} className="btn-outline" style={{ flex: 1, justifyContent: 'center', fontSize: 13, padding: '9px 0' }}>취소</button>
              <button onClick={() => { onSave && onSave(draft); setEditing(false); }} className="btn-primary" style={{ flex: 2, justifyContent: 'center', fontSize: 13, padding: '9px 0' }}>저장</button>
            </div>
          </div>
        );
      }

      const rs = result?.rating ? (RATING_STYLE[result.rating] || RATING_STYLE.moderate) : null;
      return (
        <div style={{ paddingTop: 12 }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 8 }}>
            <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 9px', borderRadius: 999, background: srcStyle.bg, color: srcStyle.color }}>{srcStyle.label}</span>
            {rs && <span style={{ fontSize: 11, fontWeight: 700, padding: '2px 9px', borderRadius: 999, background: rs.bg, color: rs.color }}>{rs.emoji} {rs.label}</span>}
            {editable && (
              <button onClick={startEdit} style={{ marginLeft: 'auto', padding: '3px 10px', background: 'none', border: '1px solid var(--outline)', borderRadius: 6, fontSize: 11, cursor: 'pointer', color: 'var(--sub)', display: 'flex', alignItems: 'center', gap: 4 }}
                onMouseEnter={e => { e.currentTarget.style.color = 'var(--primary)'; e.currentTarget.style.borderColor = 'var(--primary)'; }}
                onMouseLeave={e => { e.currentTarget.style.color = 'var(--sub)'; e.currentTarget.style.borderColor = 'var(--outline)'; }}>
                <Icon d={ICONS.edit} size={11} /> {result ? '수정' : '입력'}
              </button>
            )}
          </div>
          {result?.notes ? (
            <p style={{ fontSize: 13, color: 'var(--dark)', lineHeight: 1.75, margin: 0, padding: '10px 13px', background: 'var(--bg)', borderRadius: 10 }}>{result.notes}</p>
          ) : editable ? (
            <button onClick={startEdit} style={{ width: '100%', padding: '14px', border: '2px dashed var(--outline)', borderRadius: 10, background: 'none', cursor: 'pointer', color: 'var(--sub)', fontSize: 13 }}>
              + 결과 입력하기
            </button>
          ) : (
            <p style={{ fontSize: 13, color: 'var(--sub)', fontStyle: 'italic', margin: 0 }}>결과 없음</p>
          )}
        </div>
      );
    }

    // ============================================================
    // DIRECT TEST TAB — 인라인 확장 카드
    // ============================================================
    function DirectTestTab({ test }) {
      const { addTester, updateTester, deleteTester, updateTest, toast, getTest } = useApp();
      const [drawerOpen, setDrawerOpen] = useState(false);
      const [editingTester, setEditingTester] = useState(null);
      const [form, setForm] = useState(() => EMPTY_FORM());
      const [expandedId, setExpandedId] = useState(null);

      const currentTest = getTest(test.id) || test;
      const done = currentTest.testers.filter(t => t.result).length;

      const openAdd = () => { setEditingTester(null); setForm(EMPTY_FORM()); setDrawerOpen(true); };
      const openEdit = (tr, e) => { e.stopPropagation(); setEditingTester(tr); setForm({ name: tr.name, ageGroup: tr.ageGroup, gender: tr.gender, job: tr.job, digitalLiteracy: tr.digitalLiteracy, rating: tr.result?.rating || 'moderate', resultNotes: tr.result?.notes || '' }); setDrawerOpen(true); };
      const closeDrawer = () => setDrawerOpen(false);

      const submitDrawer = () => {
        if (!form.name.trim()) { toast('error', '이름을 입력해주세요.'); return; }
        const { name, ageGroup, gender, job, digitalLiteracy, rating, resultNotes } = form;
        const testerData = { name, ageGroup, gender, job, digitalLiteracy };
        const result = { rating, notes: resultNotes };
        if (editingTester) {
          updateTester(test.id, editingTester.id, { ...testerData, result });
          toast('success', `${form.name} 테스터 정보가 수정되었습니다.`);
        } else {
          addTester(test.id, { ...testerData, result });
          toast('success', `${form.name} 테스터가 추가되었습니다.`);
        }
        closeDrawer();
      };

      const saveResult = (testerId, result) => {
        updateTester(test.id, testerId, { result });
        toast('success', '결과가 저장되었습니다.');
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div>
              <h3 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 2px' }}>직접 테스트</h3>
              <p style={{ fontSize: 13, color: 'var(--sub)', margin: 0 }}>총 {currentTest.testers.length}명 · {done}명 입력 완료</p>
            </div>
            <button onClick={openAdd} className="btn-primary"><Icon d={ICONS.plus} size={15} /> 테스터 추가</button>
          </div>

          {currentTest.testers.length === 0 ? (
            <div className="card" style={{ padding: '48px 24px', textAlign: 'center' }}>
              <div className="primary-light-bg" style={{ width: 56, height: 56, borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 12px' }}>
                <Icon d={ICONS.users} size={26} className="primary-text" />
              </div>
              <p style={{ fontSize: 13, color: 'var(--sub)' }}>테스터 추가 버튼을 눌러 직접 테스트를 기록하세요.</p>
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
              {currentTest.testers.map(tr => {
                const isExp = expandedId === tr.id;
                const rs = tr.result?.rating ? (RATING_STYLE[tr.result.rating] || RATING_STYLE.moderate) : null;
                return (
                  <div key={tr.id} className="card" style={{ overflow: 'hidden', transition: 'box-shadow 0.15s' }}
                    onMouseEnter={e => e.currentTarget.style.boxShadow = '0 2px 14px rgba(0,0,0,0.08)'}
                    onMouseLeave={e => e.currentTarget.style.boxShadow = ''}>
                    {/* 카드 헤더 */}
                    <div style={{ display: 'flex', alignItems: 'center', padding: '14px 18px', cursor: 'pointer', gap: 12 }}
                      onClick={() => setExpandedId(isExp ? null : tr.id)}>
                      <div className="primary-bg" style={{ width: 38, height: 38, borderRadius: '50%', color: 'white', fontWeight: 800, fontSize: 14, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{testerThumb(tr.name)}</div>
                      <div style={{ flex: 1 }}>
                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', marginBottom: 3 }}>
                          <span style={{ fontWeight: 700, fontSize: 14 }}>{tr.name}</span>
                          {rs && <span style={{ fontSize: 11, fontWeight: 700, padding: '1px 8px', borderRadius: 999, background: rs.bg, color: rs.color }}>{rs.emoji} {rs.label}</span>}
                          {tr.result && <span style={{ fontSize: 11, fontWeight: 600, color: 'var(--primary)' }}>✓ 입력완료</span>}
                        </div>
                        <p style={{ fontSize: 12, color: 'var(--sub)', margin: 0 }}>{tr.ageGroup} · {tr.gender} · {tr.job || '직업 미기재'} · 리터러시 {tr.digitalLiteracy}</p>
                      </div>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 4 }}>
                        <button onClick={e => openEdit(tr, e)} style={{ padding: 5, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}
                          onMouseEnter={e => e.currentTarget.style.color = 'var(--primary)'} onMouseLeave={e => e.currentTarget.style.color = 'var(--sub)'}>
                          <Icon d={ICONS.edit} size={13} />
                        </button>
                        <button onClick={e => { e.stopPropagation(); deleteTester(test.id, tr.id); toast('info', `${tr.name} 테스터가 삭제되었습니다.`); }} style={{ padding: 5, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}
                          onMouseEnter={e => e.currentTarget.style.color = '#ef4444'} onMouseLeave={e => e.currentTarget.style.color = 'var(--sub)'}>
                          <Icon d={ICONS.trash} size={13} />
                        </button>
                        <span style={{ fontSize: 11, color: isExp ? 'var(--primary)' : 'var(--sub)', display: 'inline-block', transform: isExp ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s', marginLeft: 4 }}>▼</span>
                      </div>
                    </div>
                    {/* 펼침 영역 */}
                    {isExp && (
                      <div style={{ padding: '0 18px 18px', borderTop: '1px solid var(--outline)' }}>
                        <TestResultCard result={tr.result} source="human" editable={true} onSave={r => saveResult(tr.id, r)} />
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}

          {/* 드로어: 테스터 추가/수정 */}
          {drawerOpen && (
            <>
              <div style={{ position: 'fixed', inset: 0, background: 'rgba(26,26,46,0.3)', zIndex: 40 }} onClick={closeDrawer} />
              <div className="drawer">
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '20px 24px', borderBottom: '1px solid var(--outline)' }}>
                  <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>{editingTester ? '테스터 수정' : '테스터 추가'}</h3>
                  <button onClick={closeDrawer} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}><Icon d={ICONS.x} size={18} /></button>
                </div>
                <div style={{ flex: 1, overflowY: 'auto', padding: 24, display: 'flex', flexDirection: 'column', gap: 16 }}>
                  <DField label="이름" req><input value={form.name} onChange={e => setForm({ ...form, name: e.target.value })} placeholder="예: 김지수" className="input-base" autoFocus /></DField>
                  <DField label="나이대" req>
                    <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                      {AGE_GROUPS.map(ag => <button key={ag} className={`pill-btn ${form.ageGroup === ag ? 'selected' : ''}`} onClick={() => setForm({ ...form, ageGroup: ag })}>{ag}</button>)}
                    </div>
                  </DField>
                  <DField label="성별" req>
                    <div style={{ display: 'flex', gap: 6 }}>
                      {GENDERS.map(g => <button key={g} className={`pill-btn ${form.gender === g ? 'selected' : ''}`} onClick={() => setForm({ ...form, gender: g })}>{g}</button>)}
                    </div>
                  </DField>
                  <DField label="직업"><input value={form.job} onChange={e => setForm({ ...form, job: e.target.value })} placeholder="예: UX 디자이너" className="input-base" /></DField>
                  <DField label="디지털 리터러시(문해력)" req>
                    <div style={{ display: 'flex', gap: 6 }}>
                      {LITERACY.map(l => <button key={l} className={`pill-btn ${form.digitalLiteracy === l ? 'selected' : ''}`} style={{ flex: 1 }} onClick={() => setForm({ ...form, digitalLiteracy: l })}>{l}</button>)}
                    </div>
                  </DField>
                  <DField label="전반적인 평가">
                    <div style={{ display: 'flex', gap: 8 }}>
                      {['good', 'moderate', 'bad', 'critical'].map(v => {
                        const s = RATING_STYLE[v];
                        return (
                          <button key={v} onClick={() => setForm({ ...form, rating: v })}
                            className={`rating-btn ${v} ${form.rating === v ? 'selected' : ''}`}
                            style={{ flex: 1, minWidth: 0 }}>
                            <span style={{ fontSize: 16 }}>{s.emoji}</span>
                            <span style={{ fontSize: 11, fontWeight: 700 }}>{s.label}</span>
                          </button>
                        );
                      })}
                    </div>
                  </DField>
                  <DField label="테스트 결과 메모"><textarea value={form.resultNotes} onChange={e => setForm({ ...form, resultNotes: e.target.value })} placeholder="발화 기록, 관찰 내용, 특이사항 등을 자유롭게 기록하세요" rows={4} className="input-base" style={{ resize: 'none' }} /></DField>
                </div>
                <div style={{ padding: '16px 24px', borderTop: '1px solid var(--outline)', display: 'flex', gap: 10 }}>
                  <button onClick={closeDrawer} className="btn-outline" style={{ flex: 1, justifyContent: 'center' }}>취소</button>
                  <button onClick={submitDrawer} className="btn-primary" style={{ flex: 2, justifyContent: 'center', padding: '13px 0' }}>
                    {editingTester ? '수정 완료' : '추가하기'}
                  </button>
                </div>
              </div>
            </>
          )}
        </div>
      );
    }

    // ============================================================
    // AI TEST TAB — 10개 고정 페르소나 + Gemini 호출
    // ============================================================
    function AITestTab({ test }) {
      const { updateTest, toast, getTest } = useApp();
      const [loading, setLoading] = useState(false);
      const [expandedId, setExpandedId] = useState(null);

      const currentTest = getTest(test.id) || test;
      const aiResult = currentTest.aiTestResult;

      const runTest = async () => {
        setLoading(true);
        try {
          const r = await apiGenerateAITest(null, currentTest.purpose, currentTest.images);
          updateTest(test.id, { aiTestResult: r });
          toast('success', 'AI 가상 테스트가 완료되었습니다.');
        } catch (e) { toast('error', e.message); } finally { setLoading(false); }
      };

      const ratingDist = aiResult ? Object.entries(RATING_STYLE).filter(([k]) => k !== 'neutral').map(([k, s]) => ({
        key: k, label: s.label, emoji: s.emoji, count: (aiResult.personas || []).filter(p => p.rating === k).length, bg: s.bg, color: s.color
      })) : [];

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
            <div>
              <h3 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 4px' }}>AI 가상 테스트</h3>
              <p style={{ fontSize: 13, color: 'var(--sub)', margin: 0 }}>10명의 고정 페르소나가 서비스를 가상으로 테스트합니다.</p>
            </div>
            <button onClick={runTest} disabled={loading} className="btn-primary">
              {loading ? <Spinner size={14} /> : <Icon d={ICONS.bolt} size={14} />}
              {aiResult ? 'AI 재테스트' : 'AI 가상 테스트 실행'}
            </button>
          </div>

          {loading ? <LoadingCard msg="10명의 가상 페르소나가 테스트 중입니다..." /> : aiResult ? (
            <>
              {/* 요약 */}
              <div style={{ padding: 18, background: 'var(--primary-light)', borderRadius: 14, borderLeft: '4px solid var(--primary)' }}>
                <p style={{ fontSize: 11, fontWeight: 700, color: 'var(--primary)', letterSpacing: '0.08em', marginBottom: 6 }}>AI 테스트 종합 요약</p>
                <p style={{ fontSize: 14, lineHeight: 1.8, color: 'var(--dark)', margin: 0 }}>{aiResult.ai_ut_summary}</p>
              </div>
              {/* 평점 분포 */}
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4,1fr)', gap: 10 }}>
                {ratingDist.map(r => (
                  <div key={r.key} style={{ padding: '12px 8px', borderRadius: 12, border: `1px solid ${r.bg}`, background: r.bg, textAlign: 'center' }}>
                    <p style={{ fontSize: 20, margin: '0 0 4px' }}>{r.emoji}</p>
                    <p style={{ fontSize: 18, fontWeight: 800, color: r.color, margin: '0 0 2px' }}>{r.count}</p>
                    <p style={{ fontSize: 11, color: r.color, fontWeight: 600, margin: 0 }}>{r.label}</p>
                  </div>
                ))}
              </div>
              {/* 페르소나 카드 목록 */}
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {(aiResult.personas || []).map(p => {
                  const rs = RATING_STYLE[p.rating] || RATING_STYLE.moderate;
                  const isExp = expandedId === p.id;
                  const persona = AI_PERSONAS.find(x => x.id === p.id) || {};
                  return (
                    <div key={p.id} className="card" style={{ overflow: 'hidden' }}>
                      <div style={{ display: 'flex', alignItems: 'center', padding: '13px 18px', cursor: 'pointer', gap: 12 }}
                        onClick={() => setExpandedId(isExp ? null : p.id)}>
                        <div style={{ width: 36, height: 36, borderRadius: '50%', background: rs.bg, color: rs.color, fontWeight: 800, fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, border: `1.5px solid ${rs.color}` }}>
                          {p.name.slice(0, 1)}
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 2 }}>
                            <span style={{ fontWeight: 700, fontSize: 14 }}>{p.name}</span>
                            <span style={{ fontSize: 11, fontWeight: 700, padding: '1px 8px', borderRadius: 999, background: rs.bg, color: rs.color }}>{rs.emoji} {rs.label}</span>
                            {(p.issues || []).length > 0 && <span style={{ fontSize: 11, color: 'var(--sub)' }}>이슈 {p.issues.length}건</span>}
                          </div>
                          <p style={{ fontSize: 12, color: 'var(--sub)', margin: 0 }}>{persona.ageGroup} · {persona.gender} · {persona.job}</p>
                        </div>
                        <span style={{ fontSize: 11, color: isExp ? 'var(--primary)' : 'var(--sub)', display: 'inline-block', transform: isExp ? 'rotate(180deg)' : '', transition: 'transform 0.2s' }}>▼</span>
                      </div>
                      {isExp && (
                        <div style={{ padding: '0 18px 16px', borderTop: '1px solid var(--outline)' }}>
                          <p style={{ fontSize: 13, color: 'var(--dark)', lineHeight: 1.75, margin: '14px 0 0', padding: '10px 13px', background: 'var(--bg)', borderRadius: 10 }}>{p.notes}</p>
                          {(p.issues || []).length > 0 && (
                            <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
                              {p.issues.map((iss, i) => (
                                <div key={i} style={{ padding: '10px 14px', borderRadius: 10, border: '1px solid #fca5a5', background: '#fef2f2' }}>
                                  <p style={{ fontWeight: 700, fontSize: 12, color: '#b91c1c', margin: '0 0 3px' }}>{iss.title}</p>
                                  <p style={{ fontSize: 12, color: '#7f1d1d', lineHeight: 1.6, margin: 0 }}>{iss.content}</p>
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </>
          ) : (
            /* 실행 전: 페르소나 프리뷰 */
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2,1fr)', gap: 10 }}>
              {AI_PERSONAS.map(p => (
                <div key={p.id} style={{ padding: '12px 14px', border: '1px solid var(--outline)', borderRadius: 12, background: 'white', display: 'flex', alignItems: 'center', gap: 10 }}>
                  <div style={{ width: 34, height: 34, borderRadius: '50%', background: 'var(--bg)', color: 'var(--sub)', fontWeight: 800, fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{p.name.slice(0, 1)}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <p style={{ fontWeight: 700, fontSize: 13, margin: '0 0 2px', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{p.name}</p>
                    <p style={{ fontSize: 11, color: 'var(--sub)', margin: 0 }}>{p.ageGroup} · {p.gender} · {p.job}</p>
                    <span style={{ fontSize: 10, fontWeight: 600, padding: '1px 6px', borderRadius: 999, background: LIT_STYLE[p.digitalLiteracy].bg, color: LIT_STYLE[p.digitalLiteracy].color, marginTop: 4, display: 'inline-block' }}>{p.digitalLiteracy}</span>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }


    // ============================================================
    // TEST PROGRESS TAB — 서브탭 + UT 인사이트 리포트
    // ============================================================
    function TestProgressTab({ test }) {
      const [subTab, setSubTab] = useState('ai_test');
      const [loadI, setLoadI] = useState(false);
      const [expandedInsightId, setExpandedInsightId] = useState(null);
      const { updateTest, toast, getTest } = useApp();

      const currentTest = getTest(test.id) || test;
      const aiTestResult = currentTest.aiTestResult;
      const hasDirectResults = currentTest.testers.some(t => t.result);
      const canGenInsights = !!(aiTestResult && hasDirectResults);
      const insightHistory = currentTest.insightHistory || [];

      const genInsights = async () => {
        setLoadI(true);
        try {
          const r = await apiGenerateUTInsights(null, currentTest.purpose, aiTestResult, currentTest.testers);
          const entry = { id: uid(), createdAt: new Date().toISOString(), insights: r };
          const newHistory = [entry, ...insightHistory];
          updateTest(test.id, { insightHistory: newHistory, insights: { taskInsights: r.taskInsights, uxInsights: r.uxInsights }, status: 'completed' });
          setExpandedInsightId(entry.id);
          toast('success', 'UT 인사이트 리포트가 생성되었습니다.');
        } catch (e) { toast('error', e.message); } finally { setLoadI(false); }
      };

      const deleteEntry = (entryId) => {
        const updated = insightHistory.filter(h => h.id !== entryId);
        updateTest(test.id, { insightHistory: updated });
        if (expandedInsightId === entryId) setExpandedInsightId(updated[0]?.id || null);
        toast('info', '인사이트가 삭제되었습니다.');
      };

      const shareInsight = (entry) => {
        const ins = entry.insights;
        const lines = [
          `# UT 인사이트 리포트 — ${fmtDate(entry.createdAt)}`,
          `\n## 전반 요약\n${ins.summary || ''}`,
          ins.agreement_score != null ? `\n## AI·직접 테스트 일치도: ${ins.agreement_score}%` : '',
          ins.critical_issues?.length ? `\n## 심각 이슈\n${ins.critical_issues.map(i => `• [${i.source || ''}] ${i.title}: ${i.content}`).join('\n')}` : '',
          ins.action_items?.length ? `\n## Action Items\n${ins.action_items.map((i, n) => `${n + 1}. [${i.priority?.toUpperCase()}] ${i.title}: ${i.content}`).join('\n')}` : '',
        ].filter(Boolean).join('\n');
        navigator.clipboard.writeText(lines)
          .then(() => toast('success', '리포트가 클립보드에 복사되었습니다.'))
          .catch(() => toast('error', '복사에 실패했습니다.'));
      };

      const renderInsightBody = (ins) => {
        // 신규 문서형 포맷 (summary 존재 시)
        if (ins.summary) {
          const agrColor = ins.agreement_score >= 70 ? 'var(--primary)' : ins.agreement_score >= 40 ? '#f59e0b' : '#ef4444';
          const priorityStyle = { high: { bg: '#fee2e2', color: '#b91c1c', label: '높음' }, medium: { bg: '#fef3c7', color: '#92400e', label: '중간' }, low: { bg: '#dcfce7', color: '#15803d', label: '낮음' } };
          return (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 22, paddingTop: 20 }}>
              {/* 요약 */}
              <div style={{ padding: '16px 18px', background: 'var(--primary-light)', borderRadius: 12, borderLeft: '4px solid var(--primary)' }}>
                <p style={{ fontSize: 11, fontWeight: 700, color: 'var(--primary)', letterSpacing: '0.08em', marginBottom: 8 }}>전반적 요약</p>
                <p style={{ fontSize: 14, lineHeight: 1.85, margin: 0, color: 'var(--dark)' }}>{ins.summary}</p>
              </div>
              {/* 일치도 */}
              {ins.agreement_score != null && (
                <div className="card" style={{ padding: '16px 20px' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 10 }}>
                    <div>
                      <p style={{ fontSize: 13, fontWeight: 700, margin: '0 0 3px' }}>AI · 직접 테스트 일치도</p>
                      <p style={{ fontSize: 11, color: 'var(--sub)', margin: 0 }}>두 테스트 결과가 얼마나 일치하는지 나타냅니다</p>
                    </div>
                    <span style={{ fontSize: 26, fontWeight: 800, color: agrColor }}>{ins.agreement_score}%</span>
                  </div>
                  <div style={{ height: 8, background: 'var(--bg)', borderRadius: 999, overflow: 'hidden' }}>
                    <div style={{ height: '100%', width: `${ins.agreement_score}%`, background: agrColor, borderRadius: 999 }} />
                  </div>
                </div>
              )}
              {/* 심각 이슈 */}
              {ins.critical_issues?.length > 0 && (
                <div>
                  <h4 style={{ fontSize: 13, fontWeight: 700, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 6 }}>🚨 심각 이슈 ({ins.critical_issues.length}건)</h4>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {ins.critical_issues.map((iss, i) => (
                      <div key={i} style={{ padding: 14, borderRadius: 12, border: '1px solid #fca5a5', background: '#fef2f2' }}>
                        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 5 }}>
                          <p style={{ fontWeight: 700, fontSize: 13, margin: 0, color: '#991b1b' }}>{iss.title}</p>
                          {iss.source && <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 999, background: '#fee2e2', color: '#b91c1c', flexShrink: 0, marginLeft: 8 }}>{iss.source}</span>}
                        </div>
                        <p style={{ fontSize: 13, color: '#7f1d1d', lineHeight: 1.65, margin: 0 }}>{iss.content}</p>
                      </div>
                    ))}
                  </div>
                </div>
              )}
              {/* Action Items */}
              {ins.action_items?.length > 0 && (
                <div>
                  <h4 style={{ fontSize: 13, fontWeight: 700, marginBottom: 10, display: 'flex', alignItems: 'center', gap: 6 }}>✅ Action Items</h4>
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                    {ins.action_items.map((item, i) => {
                      const ps = priorityStyle[item.priority] || priorityStyle.medium;
                      return (
                        <div key={i} style={{ padding: 14, borderRadius: 12, border: '1px solid var(--outline)', background: 'white', display: 'flex', gap: 12, alignItems: 'flex-start' }}>
                          <span style={{ width: 20, height: 20, borderRadius: 6, fontSize: 10, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: 2, background: ps.bg, color: ps.color }}>{i + 1}</span>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                              <p style={{ fontWeight: 700, fontSize: 13, margin: 0 }}>{item.title}</p>
                              <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 999, background: ps.bg, color: ps.color }}>{ps.label}</span>
                            </div>
                            <p style={{ fontSize: 13, color: 'var(--sub)', lineHeight: 1.65, margin: 0 }}>{item.content}</p>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
              {/* Task/UX 인사이트 */}
              {[['📋 과제 수준 인사이트', ins.taskInsights, '#dbeafe', '#1d4ed8'],
              ['🎨 UX 인사이트', ins.uxInsights, '#f3e8ff', '#7e22ce']].map(([title, items, tagBg, tagColor]) => (
                items?.length > 0 && (
                  <div key={title}>
                    <h4 style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>{title}</h4>
                    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2,1fr)', gap: 10 }}>
                      {items.map(ins2 => (
                        <div key={ins2.id} style={{ border: `1px solid ${tagBg}`, borderRadius: 12, padding: 14 }}>
                          <div style={{ display: 'flex', gap: 8, marginBottom: 6 }}>
                            <span style={{ fontSize: 16, flexShrink: 0 }}>{CAT_ICONS[ins2.category] || '💡'}</span>
                            <div>
                              <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap', marginBottom: 4 }}>
                                <span style={{ fontWeight: 700, fontSize: 12 }}>{ins2.title}</span>
                                <span style={{ background: tagBg, color: tagColor, fontSize: 10, padding: '1px 7px', borderRadius: 999, fontWeight: 600 }}>{ins2.category}</span>
                              </div>
                              <p style={{ fontSize: 12, color: 'var(--dark)', lineHeight: 1.65, margin: 0 }}>{ins2.content}</p>
                            </div>
                          </div>
                          {ins2.evidence && <div style={{ paddingLeft: 8, borderLeft: '2px solid var(--outline)', marginTop: 8 }}><p style={{ fontSize: 11, color: 'var(--sub)', fontStyle: 'italic', margin: 0 }}>"{ins2.evidence}"</p></div>}
                        </div>
                      ))}
                    </div>
                  </div>
                )
              ))}
            </div>
          );
        }
        // 레거시 포맷 (summary 없음)
        return (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 20, paddingTop: 20 }}>
            {[['과제 수준 인사이트', ins.taskInsights, '#dbeafe', '#1d4ed8'],
            ['UX 인사이트', ins.uxInsights, '#f3e8ff', '#7e22ce']].map(([title, items, tagBg, tagColor]) => (
              <div key={title}>
                <h4 style={{ fontSize: 13, fontWeight: 700, marginBottom: 10 }}>{title}</h4>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2,1fr)', gap: 10 }}>
                  {(items || []).map(ins2 => (
                    <div key={ins2.id} style={{ border: `1px solid ${tagBg}`, borderRadius: 12, padding: 14 }}>
                      <div style={{ display: 'flex', gap: 8, marginBottom: 6 }}>
                        <span style={{ fontSize: 16, flexShrink: 0 }}>{CAT_ICONS[ins2.category] || '💡'}</span>
                        <div>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 6, flexWrap: 'wrap', marginBottom: 4 }}>
                            <span style={{ fontWeight: 700, fontSize: 12 }}>{ins2.title}</span>
                            <span style={{ background: tagBg, color: tagColor, fontSize: 10, padding: '1px 7px', borderRadius: 999, fontWeight: 600 }}>{ins2.category}</span>
                          </div>
                          <p style={{ fontSize: 12, color: 'var(--dark)', lineHeight: 1.65, margin: 0 }}>{ins2.content}</p>
                        </div>
                      </div>
                      {ins2.evidence && <div style={{ paddingLeft: 8, borderLeft: '2px solid var(--outline)', marginTop: 8 }}><p style={{ fontSize: 11, color: 'var(--sub)', fontStyle: 'italic', margin: 0 }}>"{ins2.evidence}"</p></div>}
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>
        );
      };

      return (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
          {/* 서브탭 */}
          <div style={{ display: 'flex', gap: 8 }}>
            {[['ai_test', 'AI 가상 테스트', ICONS.bolt], ['direct_test', '직접 테스트', ICONS.users]].map(([id, label, icon]) => (
              <button key={id} onClick={() => setSubTab(id)} className={`sub-tab-btn ${subTab === id ? 'active' : ''}`}>
                <Icon d={icon} size={14} /> {label}
              </button>
            ))}
          </div>

          {subTab === 'ai_test' ? <AITestTab test={test} /> : <DirectTestTab test={test} />}

          {/* UT 인사이트 리포트 */}
          <div className="card" style={{ padding: 24 }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 16 }}>
              <div>
                <h3 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 4px' }}>UT 인사이트 리포트</h3>
                <p style={{ fontSize: 13, color: 'var(--sub)', margin: 0 }}>
