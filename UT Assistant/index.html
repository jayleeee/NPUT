// ============================================================
const AUTH_CODE = 'paystudio';
const STORAGE_KEY = 'ut-assistant-v1';
const API_URL = 'https://generativelanguage.googleapis.com/v1beta/models/';
const MODEL = 'gemini-2.5-flash';
const GEMINI_API_KEY = 'AIzaSyChYqfbiLX6rNWEbOaCMd_ndSHcQmAQVVY';

const uid = () => Math.random().toString(36).slice(2, 9);

const fmt = (iso) => new Date(iso).toLocaleDateString('ko-KR', { year: 'numeric', month: 'long', day: 'numeric' });
const fmtShort = (iso) => new Date(iso).toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });

// ============================================================
// STORAGE
// ============================================================
const loadState = () => {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}'); }
  catch { return {}; }
};
const saveState = (state) => {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch {}
};

// ============================================================
// GLOBAL STATE (Context)
// ============================================================
const AppContext = createContext(null);

function useApp() { return useContext(AppContext); }

function AppProvider({ children }) {
  const saved = loadState();
  const [isAuth, setIsAuth] = useState(saved.isAuth || false);
  const [tests, setTests] = useState(saved.tests || []);
  const [toasts, setToasts] = useState([]);
  const [page, setPage] = useState(isAuth ? 'dashboard' : 'landing');
  const [testId, setTestId] = useState(null);

  useEffect(() => {
    saveState({ isAuth, tests });
  }, [isAuth, tests]);

  const login = (code) => {
    if (code === AUTH_CODE) { setIsAuth(true); setPage('dashboard'); return true; }
    return false;
  };
  const logout = () => { setIsAuth(false); setPage('landing'); };

  const addTest = (data) => {
    const t = { id: uid(), name: data.name, purpose: data.purpose, images: data.images || [], status: 'preparing', createdAt: new Date().toISOString(), testers: [] };
    setTests(prev => [t, ...prev]);
    return t;
  };
  const updateTest = (id, updates) => setTests(prev => prev.map(t => t.id === id ? {...t, ...updates} : t));
  const deleteTest = (id) => setTests(prev => prev.filter(t => t.id !== id));
  const getTest = (id) => tests.find(t => t.id === id);

  const addTester = (testId, data) => {
    const tester = { id: uid(), ...data };
    setTests(prev => prev.map(t => t.id === testId ? {...t, testers: [...t.testers, tester]} : t));
  };
  const updateTester = (testId, testerId, updates) => {
    setTests(prev => prev.map(t => t.id === testId ? {...t, testers: t.testers.map(tr => tr.id === testerId ? {...tr, ...updates} : tr)} : t));
  };
  const deleteTester = (testId, testerId) => {
    setTests(prev => prev.map(t => t.id === testId ? {...t, testers: t.testers.filter(tr => tr.id !== testerId)} : t));
  };

  const toast = (type, msg) => {
    const id = uid();
    setToasts(prev => [...prev, { id, type, msg }]);
    setTimeout(() => setToasts(prev => prev.filter(t => t.id !== id)), 3500);
  };

  const navigate = (p, tid) => { setPage(p); if (tid) setTestId(tid); };

  return (
    <AppContext.Provider value={{ isAuth, tests, toasts, testId, page, login, logout, addTest, updateTest, deleteTest, getTest, addTester, updateTester, deleteTester, toast, navigate }}>
      {children}
    </AppContext.Provider>
  );
}

// ============================================================
// CLAUDE API
// ============================================================
async function callGemini(apiKey, system, content) {
  const url = `${API_URL}${MODEL}:generateContent?key=${apiKey}`;

  // Claude 형식 → Gemini parts 형식으로 변환
  let parts;
  if (typeof content === 'string') {
    parts = [{ text: content }];
  } else {
    parts = content.map(c => {
      if (c.type === 'text') return { text: c.text };
      if (c.type === 'image') return { inline_data: { mime_type: c.source.media_type, data: c.source.data } };
      return { text: '' };
    });
  }

  const body = {
    system_instruction: { parts: [{ text: system }] },
    contents: [{ role: 'user', parts }],
    generationConfig: { maxOutputTokens: 4096, temperature: 0.7 }
  };

  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!res.ok) { const e = await res.json().catch(() => ({})); throw new Error(e?.error?.message || `API 오류 ${res.status}`); }
  const data = await res.json();
  return data.candidates[0].content.parts[0].text;
}

const parseJSON = (text) => {
  const cleaned = text.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
  return JSON.parse(cleaned);
};

const b64type = (b) => {
  if (b.includes('png')) return 'image/png';
  if (b.includes('gif')) return 'image/gif';
  if (b.includes('webp')) return 'image/webp';
  return 'image/jpeg';
};
const b64data = (b) => b.includes(',') ? b.split(',')[1] : b;

const imgBlock = (b) => ({ type: 'image', source: { type: 'base64', media_type: b64type(b), data: b64data(b) } });

async function apiGenerateGuide(key, purpose, images) {
  const sys = `당신은 UX 리서치 전문가입니다. 반드시 다음 JSON만 응답하세요:
{"opening":"오프닝 멘트(3-5문장)","questions":["질문1","질문2","질문3","질문4","질문5"],"closing":"클로징 멘트(2-3문장)"}
단계별 질문은 반드시 5개 이하로 작성하세요.`;
  const content = [
    { type: 'text', text: `테스트 목적: ${purpose}\n\n위 목적과 화면 이미지를 바탕으로 UT 진행 가이드를 작성해주세요.` },
    ...images.slice(0, 4).map(imgBlock)
  ];
  return parseJSON(await callGemini(key, sys, content));
}

async function apiGenerateScenarios(key, purpose, images) {
  const sys = `당신은 UX 리서치 전문가입니다. 반드시 다음 JSON만 응답하세요:
{"scenarios":["시나리오1","시나리오2","시나리오3"]}
시나리오는 반드시 3개만 작성하세요.`;
  const content = [
    { type: 'text', text: `테스트 목적: ${purpose}\n\n과제 시나리오 3개를 현실적 맥락과 함께 작성해주세요.` },
    ...images.slice(0, 3).map(imgBlock)
  ];
  const r = parseJSON(await callGemini(key, sys, content));
  return r.scenarios;
}

async function apiGenerateInsights(key, purpose, testers) {
  const sys = `당신은 UX 리서치 전문가입니다. 반드시 다음 JSON만 응답하세요:
{"taskInsights":[{"id":"t1","title":"제목","content":"내용","evidence":"인용구","category":"카테고리"}],"uxInsights":[{"id":"u1","title":"제목","content":"내용","evidence":"인용구","category":"카테고리"}]}
카테고리: 내비게이션,CTA,온보딩,폼,피드백,모달,정보구조,시각디자인,인터랙션 중 하나
각 인사이트는 테스터 페르소나(연령대, 성별, 직업, 디지털 리터러시)와 그들의 실제 반응/메모를 함께 근거로 활용하세요.`;
  const ratingLabel = (r) => r==='good'?'좋음':r==='neutral'?'보통':'나쁨';
  const text = testers.filter(t => t.result).map(t =>
    `▶ 테스터: ${t.name}
  - 페르소나: ${t.ageGroup} / ${t.gender} / 직업: ${t.job||'미기재'} / 디지털 리터러시: ${t.digitalLiteracy}
  - 특징 메모(배경): ${t.memo||'없음'}
  - 전반 평가: ${ratingLabel(t.result.rating)}
  - 테스트 메모: ${t.result.notes||'없음'}`
  ).join('\n\n');
  return parseJSON(await callGemini(key, sys, `테스트 목적: ${purpose}\n\n=== 테스터별 결과 ===\n${text}\n\n위 페르소나 정보와 메모를 종합하여 taskInsights 3-5개, uxInsights 2-4개를 도출하세요. evidence에는 테스터 메모에서 실제 인용구를 넣어주세요.`));
}

async function apiGenerateAnnotations(key, imgB64, insights) {
  const sys = `당신은 UX 전문가입니다. 반드시 다음 JSON만 응답하세요:
{"annotations":[{"number":1,"title":"제목","content":"개선 방안","position":{"x":50,"y":30}}]}
position은 이미지 내 위치(0-100%). 3-6개 작성.`;
  const content = [
    { type: 'text', text: `인사이트:\n${insights.map(i => `- ${i.title}: ${i.content}`).join('\n')}\n\n이 화면의 개선 어노테이션을 작성해주세요.` },
    imgBlock(imgB64)
  ];
  const r = parseJSON(await callGemini(key, sys, content));
  return r.annotations;
}

    <div className="toast slide-in">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={colors[toast.type]} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
        {toast.type === 'success' ? <path d="M5 13l4 4L19 7" /> : toast.type === 'error' ? <path d="M6 18L18 6M6 6l12 12" /> : <path d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />}
      </svg>
      <p style={{ flex: 1, fontSize: 14 }}>{toast.msg}</p>
    </div>
  );
}

function ToastContainer() {
  const { toasts } = useApp();
  return (
    <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 100, display: 'flex', flexDirection: 'column', gap: 8 }}>
      {toasts.map(t => <Toast key={t.id} toast={t} />)}
    </div>
  );
}

function Modal({ isOpen, onClose, title, children, size = 'md' }) {
  useEffect(() => {
    if (isOpen) document.body.style.overflow = 'hidden';
    else document.body.style.overflow = '';
    return () => { document.body.style.overflow = ''; };
  }, [isOpen]);
  if (!isOpen) return null;
  return (
    <div className="overlay" onClick={onClose}>
      <div className={`modal modal-${size} fade-in`} onClick={e => e.stopPropagation()}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '20px 24px', borderBottom: '1px solid var(--outline)' }}>
          <h2 style={{ fontSize: 17, fontWeight: 700, margin: 0 }}>{title}</h2>
          <button onClick={onClose} className="btn-outline" style={{ padding: '6px', borderRadius: 8, minWidth: 0 }}>
            <Icon d={ICONS.x} size={16} />
          </button>
        </div>
        <div style={{ padding: 24 }}>{children}</div>
      </div>
    </div>
  );
}

function fmtDate(iso) {
  const d = new Date(iso);
  return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function GuideTab({ test }) {
  const { updateTest, toast } = useApp();
  const [loadG, setLoadG] = useState(false);
  const [loadS, setLoadS] = useState(false);

  // 히스토리: 기존 test.guide가 있으면 마이그레이션
  const initHistory = () => {
    if (test.guideHistory && test.guideHistory.length > 0) return test.guideHistory;
    if (test.guide) return [{ id: uid(), createdAt: test.createdAt || new Date().toISOString(), guide: test.guide }];
    return [];
  };
  const [guideHistory, setGuideHistory] = useState(initHistory);
  const [expandedId, setExpandedId] = useState(initHistory()[0]?.id || null);
  const [editingId, setEditingId] = useState(null);
  const [editingGuide, setEditingGuide] = useState(null);

  const [scenarios, setScenarios] = useState(test.scenarios || []);
  const [editId, setEditId] = useState(null);
  const [editVal, setEditVal] = useState('');

  const genGuide = async () => {
    setLoadG(true);
    try {
      const r = await apiGenerateGuide(GEMINI_API_KEY, test.purpose, test.images);
      const entry = { id: uid(), createdAt: new Date().toISOString(), guide: r };
      const newHistory = [entry, ...guideHistory];
      setGuideHistory(newHistory);
      setExpandedId(entry.id);
      setEditingId(null); setEditingGuide(null);
      updateTest(test.id, { guideHistory: newHistory });
      toast('success', 'AI 가이드가 생성되었습니다.');
    } catch(e) { toast('error', e.message); } finally { setLoadG(false); }
  };

  const deleteGuideEntry = (entryId) => {
    const updated = guideHistory.filter(h => h.id !== entryId);
    setGuideHistory(updated);
    if (expandedId === entryId) setExpandedId(updated[0]?.id || null);
    if (editingId === entryId) { setEditingId(null); setEditingGuide(null); }
    updateTest(test.id, { guideHistory: updated });
    toast('info', '가이드가 삭제되었습니다.');
  };

  const startEdit = (entry) => {
    setEditingId(entry.id);
    setEditingGuide({ ...entry.guide, questions: [...entry.guide.questions] });
  };

  const saveEdit = () => {
    const updated = guideHistory.map(h => h.id === editingId ? { ...h, guide: editingGuide } : h);
    setGuideHistory(updated);
    updateTest(test.id, { guideHistory: updated });
    setEditingId(null); setEditingGuide(null);
    toast('success', '가이드가 저장되었습니다.');
  };

  const genScenarios = async () => {
    setLoadS(true);
    try {
      const r = await apiGenerateScenarios(GEMINI_API_KEY, test.purpose, test.images);
      const sc = r.slice(0, 3).map((c, i) => ({ id: uid(), order: i+1, content: c }));
      setScenarios(sc); updateTest(test.id, { scenarios: sc });
      toast('success', 'AI 시나리오가 생성되었습니다.');
    } catch(e) { toast('error', e.message); } finally { setLoadS(false); }
  };

  const addScenario = () => {
    const s = { id: uid(), order: scenarios.length+1, content: '새 시나리오를 작성해주세요.' };
    const updated = [...scenarios, s]; setScenarios(updated); updateTest(test.id, { scenarios: updated });
    setEditId(s.id); setEditVal(s.content);
  };
  const delScenario = (id) => {
    const updated = scenarios.filter(s=>s.id!==id).map((s,i)=>({...s,order:i+1}));
    setScenarios(updated); updateTest(test.id, { scenarios: updated });
  };
  const saveScenario = (id) => {
    const updated = scenarios.map(s=>s.id===id ? {...s,content:editVal} : s);
    setScenarios(updated); updateTest(test.id, { scenarios: updated }); setEditId(null);
  };

  const renderGuideContent = (entry) => {
    const isEditing = editingId === entry.id;
    const g = isEditing ? editingGuide : entry.guide;
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20, paddingTop: 20, borderTop: '1px solid var(--outline)' }}>
        <div>
          <label style={{ display: 'block', fontSize: 11, fontWeight: 700, color: 'var(--sub)', letterSpacing: '0.08em', marginBottom: 8, textTransform: 'uppercase' }}>오프닝 멘트</label>
          {isEditing
            ? <textarea value={g.opening} onChange={e => setEditingGuide({...g, opening: e.target.value})} rows={3} className="input-base" style={{ resize: 'none' }} />
            : <p style={{ fontSize: 14, color: 'var(--dark)', lineHeight: 1.7, margin: 0, padding: '12px 14px', background: 'var(--bg)', borderRadius: 10 }}>{g.opening}</p>}
        </div>
        <div>
          <label style={{ display: 'block', fontSize: 11, fontWeight: 700, color: 'var(--sub)', letterSpacing: '0.08em', marginBottom: 8, textTransform: 'uppercase' }}>단계별 질문 ({g.questions.length}개 / 최대 5개)</label>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
            {g.questions.map((q, i) => (
              <div key={i} style={{ display: 'flex', gap: 8, alignItems: 'flex-start' }}>
                <span className="primary-light-bg primary-text" style={{ width: 24, height: 24, borderRadius: '50%', fontSize: 11, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0, marginTop: isEditing ? 8 : 4 }}>{i+1}</span>
                {isEditing
                  ? <>
                      <textarea value={q} onChange={e => { const qs=[...g.questions]; qs[i]=e.target.value; setEditingGuide({...g,questions:qs}); }} rows={2} className="input-base" style={{ resize: 'none', flex: 1 }} />
                      <button onClick={() => setEditingGuide({...g, questions: g.questions.filter((_,j)=>j!==i)})} style={{ padding: 6, marginTop: 6, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}><Icon d={ICONS.x} size={14} /></button>
                    </>
                  : <p style={{ fontSize: 14, color: 'var(--dark)', flex: 1, lineHeight: 1.6, margin: 0, padding: '8px 0' }}>{q}</p>}
              </div>
            ))}
            {isEditing && g.questions.length < 5 && (
              <button onClick={() => setEditingGuide({...g, questions: [...g.questions, '']})} style={{ display: 'flex', alignItems: 'center', gap: 4, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--primary)', fontSize: 13, fontWeight: 600, marginLeft: 32, padding: 4 }}>
                <Icon d={ICONS.plus} size={14} /> 질문 추가
              </button>
            )}
          </div>
        </div>
        <div>
          <label style={{ display: 'block', fontSize: 11, fontWeight: 700, color: 'var(--sub)', letterSpacing: '0.08em', marginBottom: 8, textTransform: 'uppercase' }}>클로징 멘트</label>
          {isEditing
            ? <textarea value={g.closing} onChange={e => setEditingGuide({...g, closing: e.target.value})} rows={2} className="input-base" style={{ resize: 'none' }} />
            : <p style={{ fontSize: 14, color: 'var(--dark)', lineHeight: 1.7, margin: 0, padding: '12px 14px', background: 'var(--bg)', borderRadius: 10 }}>{g.closing}</p>}
        </div>
        <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 8 }}>
          {isEditing
            ? <>
                <button onClick={() => { setEditingId(null); setEditingGuide(null); }} className="btn-outline" style={{ fontSize: 13 }}>취소</button>
                <button onClick={saveEdit} className="btn-primary" style={{ fontSize: 13 }}>저장</button>
              </>
            : <button onClick={() => startEdit(entry)} className="btn-outline" style={{ fontSize: 13 }}><Icon d={ICONS.edit} size={13} /> 수정</button>}
        </div>
      </div>
    );
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
      {/* Guide */}
      <div className="card" style={{ padding: 24 }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: guideHistory.length > 0 ? 16 : 0 }}>
          <div>
            <h3 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 4px' }}>진행 가이드</h3>
            <p style={{ fontSize: 13, color: 'var(--sub)', margin: 0 }}>오프닝 / 단계별 질문(최대 5개) / 클로징 스크립트</p>
          </div>
          <button onClick={genGuide} disabled={loadG} className="btn-primary">
            {loadG ? <Spinner size={14} /> : <Icon d={ICONS.bolt} size={14} />}
            {guideHistory.length > 0 ? 'AI 재생성' : 'AI 가이드 생성'}
          </button>
        </div>

        {loadG ? <LoadingCard msg="AI가 가이드를 작성 중입니다..." /> : guideHistory.length === 0 ? (
          <div style={{ textAlign: 'center', padding: '40px 0' }}>
            <div className="primary-light-bg" style={{ width: 56, height: 56, borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 12px' }}>
              <Icon d={ICONS.doc} size={26} className="primary-text" />
            </div>
            <p style={{ fontSize: 13, color: 'var(--sub)' }}>AI 가이드 생성 버튼을 눌러 진행 스크립트를 자동으로 만들어보세요.</p>
          </div>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {guideHistory.map((entry, idx) => (
              <div key={entry.id} style={{ border: '1px solid var(--outline)', borderRadius: 14, padding: '14px 18px', background: idx === 0 ? 'white' : 'var(--bg)' }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer' }} onClick={() => setExpandedId(expandedId === entry.id ? null : entry.id)}>
                    <span style={{ fontSize: 12, color: expandedId===entry.id ? 'var(--primary)' : 'var(--sub)', transition: 'transform 0.2s', display: 'inline-block', transform: expandedId===entry.id ? 'rotate(180deg)' : 'rotate(0deg)' }}>▼</span>
                    <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--dark)' }}>{fmtDate(entry.createdAt)}</span>
                    {idx === 0 && <span style={{ fontSize: 11, fontWeight: 700, background: 'var(--primary-light)', color: 'var(--primary)', padding: '2px 8px', borderRadius: 999 }}>최신</span>}
                  </div>
                  <button onClick={() => deleteGuideEntry(entry.id)} style={{ padding: 6, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}
                    onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='var(--sub)'}>
                    <Icon d={ICONS.trash} size={14} />
                  </button>
                </div>
                {expandedId === entry.id && renderGuideContent(entry)}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Scenarios */}
      <div className="card" style={{ padding: 24 }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 20 }}>
          <div>
            <h3 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 4px' }}>Task 시나리오</h3>
            <p style={{ fontSize: 13, color: 'var(--sub)', margin: 0 }}>테스터에게 제시할 단계별 과제</p>
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <button onClick={genScenarios} disabled={loadS} style={{ border: '1.5px solid var(--primary)', color: 'var(--primary)', background: 'white', borderRadius: 10, padding: '8px 14px', fontSize: 13, fontWeight: 600, cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 6, opacity: loadS ? 0.5 : 1 }}>
              {loadS ? <Spinner size={13} /> : <Icon d={ICONS.bolt} size={13} />} AI 초안 생성
            </button>
            <button onClick={addScenario} className="btn-outline" style={{ fontSize: 13 }}><Icon d={ICONS.plus} size={13} /> 직접 추가</button>
          </div>
        </div>
        {loadS ? <LoadingCard msg="AI가 시나리오를 작성 중입니다..." /> : scenarios.length === 0 ? (
          <p style={{ textAlign: 'center', color: 'var(--sub)', fontSize: 13, padding: '32px 0' }}>시나리오가 없습니다. AI 초안 생성 또는 직접 추가 버튼을 눌러주세요.</p>
        ) : (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
            {scenarios.map(s => (
              <div key={s.id} style={{ border: '1px solid var(--outline)', borderRadius: 12, padding: 16 }}>
                {editId === s.id ? (
                  <div>
                    <textarea value={editVal} onChange={e => setEditVal(e.target.value)} rows={3} className="input-base" style={{ resize: 'none', marginBottom: 8 }} autoFocus />
                    <div style={{ display: 'flex', gap: 6 }}>
                      <button onClick={() => saveScenario(s.id)} className="btn-primary" style={{ padding: '6px 14px', fontSize: 12 }}>저장</button>
                      <button onClick={() => setEditId(null)} className="btn-outline" style={{ padding: '6px 14px', fontSize: 12 }}>취소</button>
                    </div>
                  </div>
                ) : (
                  <div style={{ display: 'flex', alignItems: 'flex-start', gap: 12 }} className="group">
                    <span className="primary-bg" style={{ width: 28, height: 28, borderRadius: '50%', color: 'white', fontSize: 12, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{s.order}</span>
                    <p style={{ fontSize: 14, color: 'var(--dark)', flex: 1, lineHeight: 1.6, margin: 0 }}>{s.content}</p>
                    <div style={{ display: 'flex', gap: 4 }}>
                      <button onClick={() => { setEditId(s.id); setEditVal(s.content); }} style={{ padding: 5, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}><Icon d={ICONS.edit} size={13} /></button>
                      <button onClick={() => delScenario(s.id)} style={{ padding: 5, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}><Icon d={ICONS.trash} size={13} /></button>
                    </div>
                  </div>
                )}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

function DField({ label, req, children }) {
  return <div><label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 7 }}>{label}{req && <span style={{ color: '#ef4444', marginLeft: 2 }}>*</span>}</label>{children}</div>;
}

// ============================================================
// TEST TAB (테스터 목록 + 테스트 결과 통합)
// ============================================================
const AGE_GROUPS = ['10대','20대','30대','40대','50대 이상'];
const GENDERS = ['남','여'];
const LITERACY = ['낮음','보통','높음'];
const LIT_STYLE = { 낮음: { bg:'#fee2e2', color:'#b91c1c' }, 보통: { bg:'#fef3c7', color:'#92400e' }, 높음: { bg:'#dcfce7', color:'#15803d' } };
const RATING_STYLE = { good: { bg:'#dcfce7', color:'#15803d', label:'좋음', emoji:'😊' }, neutral: { bg:'#fef3c7', color:'#92400e', label:'보통', emoji:'😐' }, bad: { bg:'#fee2e2', color:'#b91c1c', label:'나쁨', emoji:'😞' } };
const CAT_ICONS = { '내비게이션':'🧭', 'CTA':'🎯', '온보딩':'🚀', '폼':'📝', '피드백':'💬', '모달':'🪟', '정보구조':'🗂️', '시각디자인':'🎨', '인터랙션':'👆' };

const randomTesterName = () => `테스터${Math.floor(Math.random() * 90 + 10)}`;
const testerThumb = (name) => { const m = name.match(/\d+/); return m ? m[0] : name.slice(0,2); };
const EMPTY_FORM = () => ({ name: randomTesterName(), ageGroup:'30대', gender:'여', job:'', digitalLiteracy:'보통', memo:'' });

function TestTab({ test }) {
  const { addTester, updateTester, deleteTester, updateTest, toast, getTest } = useApp();

  // 테스터 드로어 상태 (editingTester = null: 추가모드, object: 수정모드)
  const [drawerOpen, setDrawerOpen] = useState(false);
  const [editingTester, setEditingTester] = useState(null);
  const [form, setForm] = useState(() => EMPTY_FORM());

  // 결과 선택 상태
  const [selId, setSelId] = useState(test.testers[0]?.id || '');
  const [loadI, setLoadI] = useState(false);
  const [expandedInsightId, setExpandedInsightId] = useState(null);

  const currentTest = getTest(test.id) || test;
  const selectedTester = currentTest.testers.find(t => t.id === selId);
  const allDone = currentTest.testers.length > 0 && currentTest.testers.every(t => t.result);
  const insightHistory = currentTest.insightHistory || (currentTest.insights ? [{ id: 'legacy', createdAt: currentTest.updatedAt || currentTest.createdAt || new Date().toISOString(), insights: currentTest.insights }] : []);

  // 드로어 열기
  const openAdd = () => { setEditingTester(null); setForm(EMPTY_FORM()); setDrawerOpen(true); };
  const openEdit = (tr) => { setEditingTester(tr); setForm({ name:tr.name, ageGroup:tr.ageGroup, gender:tr.gender, job:tr.job, digitalLiteracy:tr.digitalLiteracy, memo:tr.memo }); setDrawerOpen(true); };
  const closeDrawer = () => setDrawerOpen(false);

  const submitDrawer = () => {
    if (!form.name.trim()) { toast('error', '이름을 입력해주세요.'); return; }
    if (editingTester) {
      updateTester(test.id, editingTester.id, form);
      toast('success', `${form.name} 테스터 정보가 수정되었습니다.`);
    } else {
      addTester(test.id, form);
      toast('success', `${form.name} 테스터가 추가되었습니다.`);
    }
    closeDrawer();
  };

  // 결과 입력
  const setRating = (r) => {
    if (!selectedTester) return;
    updateTester(test.id, selId, { result: { notes: selectedTester.result?.notes||'', rating: r } });
  };
  const setNotes = (n) => {
    if (!selectedTester) return;
    updateTester(test.id, selId, { result: { rating: selectedTester.result?.rating||'neutral', notes: n } });
  };

  // AI 인사이트
  const genInsights = async () => {
    setLoadI(true);
    try {
      const r = await apiGenerateInsights(GEMINI_API_KEY, currentTest.purpose, currentTest.testers);
      const entry = { id: uid(), createdAt: new Date().toISOString(), insights: r };
      const newHistory = [entry, ...(currentTest.insightHistory || (currentTest.insights ? [{ id: 'legacy', createdAt: currentTest.createdAt || new Date().toISOString(), insights: currentTest.insights }] : []))];
      updateTest(test.id, { insightHistory: newHistory, status: 'completed' });
      setExpandedInsightId(entry.id);
      toast('success', 'AI 인사이트가 생성되었습니다.');
    } catch(e) { toast('error', e.message); } finally { setLoadI(false); }
  };

  const deleteInsightEntry = (entryId) => {
    const updated = insightHistory.filter(h => h.id !== entryId);
    updateTest(test.id, { insightHistory: updated });
    if (expandedInsightId === entryId) setExpandedInsightId(updated[0]?.id || null);
    toast('info', '인사이트가 삭제되었습니다.');
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>

      {/* ── 상단: 테스터 목록 ── */}
      <div className="card" style={{ padding: 24 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
          <div>
            <h3 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 2px' }}>테스터 목록</h3>
            <p style={{ fontSize: 13, color: 'var(--sub)', margin: 0 }}>총 {currentTest.testers.length}명 등록됨</p>
          </div>
          <button onClick={openAdd} className="btn-primary"><Icon d={ICONS.plus} size={15} /> 테스터 추가</button>
        </div>

        {currentTest.testers.length === 0 ? (
          <div style={{ textAlign: 'center', padding: '40px 0' }}>
            <div className="primary-light-bg" style={{ width: 56, height: 56, borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 12px' }}>
              <Icon d={ICONS.users} size={26} className="primary-text" />
            </div>
            <p style={{ fontSize: 13, color: 'var(--sub)' }}>테스터 추가 버튼을 눌러주세요.</p>
          </div>
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 14 }}>
            {currentTest.testers.map(tr => (
              <div key={tr.id} className="card" style={{ padding: '14px 16px' }}
                onMouseEnter={e => e.currentTarget.style.boxShadow='0 2px 12px rgba(0,0,0,0.07)'}
                onMouseLeave={e => e.currentTarget.style.boxShadow=''}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 10 }}>
                  <div className="primary-bg" style={{ width: 36, height: 36, borderRadius: '50%', color: 'white', fontWeight: 800, fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{testerThumb(tr.name)}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <p style={{ fontWeight: 700, fontSize: 14, margin: 0, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{tr.name}</p>
                    <p style={{ fontSize: 11, color: 'var(--sub)', margin: 0 }}>{tr.ageGroup} · {tr.gender} · {tr.job || '직업 미기재'}</p>
                  </div>
                  {/* 수정 / 삭제 버튼 */}
                  <div style={{ display: 'flex', gap: 2, flexShrink: 0 }}>
                    <button onClick={() => openEdit(tr)} style={{ padding: 5, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}
                      onMouseEnter={e=>e.currentTarget.style.color='var(--primary)'} onMouseLeave={e=>e.currentTarget.style.color='var(--sub)'}>
                      <Icon d={ICONS.edit} size={13} />
                    </button>
                    <button onClick={() => { deleteTester(test.id, tr.id); toast('info', `${tr.name} 테스터가 삭제되었습니다.`); }} style={{ padding: 5, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}
                      onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='var(--sub)'}>
                      <Icon d={ICONS.trash} size={13} />
                    </button>
                  </div>
                </div>
                <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
                  <span className="tag" style={{ background: LIT_STYLE[tr.digitalLiteracy].bg, color: LIT_STYLE[tr.digitalLiteracy].color }}>{tr.digitalLiteracy}</span>
                  {tr.result && <span className="tag" style={{ background: RATING_STYLE[tr.result.rating].bg, color: RATING_STYLE[tr.result.rating].color }}>{RATING_STYLE[tr.result.rating].label}</span>}
                  {tr.result && <span className="tag" style={{ background: 'var(--primary-light)', color: 'var(--primary)' }}>입력완료 ✓</span>}
                </div>
                {tr.memo && <p style={{ fontSize: 11, color: 'var(--sub)', marginTop: 8 }} className="line-clamp-2">{tr.memo}</p>}
              </div>
            ))}
          </div>
        )}
      </div>

      {/* ── 하단: 테스트 결과 ── */}
      {currentTest.testers.length > 0 && (
        <>
          <div style={{ display: 'flex', gap: 20 }}>
            {/* 테스터 선택 사이드 */}
            <div style={{ width: 176, flexShrink: 0 }}>
              <div className="card" style={{ overflow: 'hidden' }}>
                <div style={{ padding: '10px 14px', borderBottom: '1px solid var(--outline)', background: 'var(--bg)' }}>
                  <p style={{ fontSize: 11, fontWeight: 700, color: 'var(--sub)', letterSpacing: '0.08em', margin: 0, textTransform: 'uppercase' }}>테스트 결과</p>
                </div>
                {currentTest.testers.map(tr => (
                  <button key={tr.id} onClick={() => setSelId(tr.id)} style={{ width: '100%', border: 'none', borderBottom: '1px solid var(--outline)', cursor: 'pointer', padding: '10px 14px', textAlign: 'left', background: selId===tr.id ? 'var(--primary-light)' : 'white', transition: 'all 0.1s' }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
                      <span style={{ fontSize: 13, fontWeight: 600, color: selId===tr.id ? 'var(--primary)' : 'var(--dark)' }}>{tr.name}</span>
                      {tr.result && <Icon d={ICONS.check} size={14} className="primary-text" />}
                    </div>
                    <p style={{ fontSize: 11, color: 'var(--sub)', margin: '2px 0 0' }}>{tr.ageGroup}</p>
                  </button>
                ))}
              </div>
            </div>

            {/* 결과 입력 폼 */}
            {selectedTester && (
              <div className="card" style={{ flex: 1, padding: 24, display: 'flex', flexDirection: 'column', gap: 18 }}>
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, paddingBottom: 16, borderBottom: '1px solid var(--outline)' }}>
                  <div className="primary-bg" style={{ width: 38, height: 38, borderRadius: '50%', color: 'white', fontWeight: 800, fontSize: 13, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{testerThumb(selectedTester.name)}</div>
                  <div>
                    <p style={{ fontWeight: 700, fontSize: 15, margin: 0 }}>{selectedTester.name}</p>
                    <p style={{ fontSize: 12, color: 'var(--sub)', margin: 0 }}>{selectedTester.ageGroup} · {selectedTester.gender} · {selectedTester.digitalLiteracy} 리터러시</p>
                  </div>
                </div>
                <div>
                  <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 10 }}>전반적인 평가</label>
                  <div style={{ display: 'flex', gap: 10 }}>
                    {Object.entries(RATING_STYLE).map(([v, s]) => (
                      <button key={v} onClick={() => setRating(v)} className={`rating-btn ${v} ${selectedTester.result?.rating===v?'selected':''}`}>
                        <span style={{ fontSize: 22 }}>{s.emoji}</span>
                        <span style={{ fontSize: 13, fontWeight: 600 }}>{s.label}</span>
                      </button>
                    ))}
                  </div>
                </div>
                <div>
                  <label style={{ display: 'block', fontSize: 13, fontWeight: 600, marginBottom: 6 }}>메모</label>
                  <p style={{ fontSize: 12, color: 'var(--sub)', marginBottom: 8 }}>발화 기록, 관찰 내용, 특이사항 등을 자유롭게 기록하세요</p>
                  <textarea value={selectedTester.result?.notes||''} onChange={e=>setNotes(e.target.value)} placeholder={`예) "버튼이 어디 있는지 모르겠어요" — 검색 버튼 찾는 데 40초 소요...`} rows={7} className="input-base" style={{ resize: 'none' }} />
                </div>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                  <p style={{ fontSize: 12, color: 'var(--sub)', margin: 0 }}>{currentTest.testers.filter(t=>t.result).length}/{currentTest.testers.length}명 입력 완료</p>
                  {selectedTester.result && <span style={{ fontSize: 12, fontWeight: 600, color: 'var(--primary)', display: 'flex', alignItems: 'center', gap: 4 }}><Icon d={ICONS.check} size={13} /> 저장됨</span>}
                </div>
              </div>
            )}
          </div>

          {/* AI 인사이트 */}
          <div className="card" style={{ padding: 24 }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 16 }}>
              <div>
                <h3 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 4px' }}>AI 인사이트 분석</h3>
                <p style={{ fontSize: 13, color: 'var(--sub)', margin: 0 }}>{allDone ? '모든 결과가 입력되었습니다. AI 분석을 진행하세요.' : `${currentTest.testers.filter(t=>t.result).length}/${currentTest.testers.length}명 입력 완료 후 분석 가능합니다.`}</p>
              </div>
              <button onClick={genInsights} disabled={!allDone||loadI} className="btn-primary">
                {loadI ? <Spinner size={14} /> : <Icon d={ICONS.bolt} size={14} />}
                {insightHistory.length > 0 ? 'AI 재분석' : 'AI 인사이트 생성'}
              </button>
            </div>
            {loadI ? <LoadingCard msg="AI가 테스트 결과를 분석 중입니다..." /> : insightHistory.length > 0 ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {insightHistory.map((entry, idx) => (
                  <div key={entry.id} style={{ border: '1px solid var(--outline)', borderRadius: 14, overflow: 'hidden' }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', padding: '14px 18px', background: idx === 0 ? 'white' : 'var(--bg)', cursor: 'pointer' }}
                      onClick={() => setExpandedInsightId(expandedInsightId === entry.id ? null : entry.id)}>
                      <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                        <span style={{ fontSize: 12, color: expandedInsightId===entry.id ? 'var(--primary)' : 'var(--sub)', display: 'inline-block', transform: expandedInsightId===entry.id ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}>▼</span>
                        <span style={{ fontSize: 13, fontWeight: 600, color: 'var(--dark)' }}>{fmtDate(entry.createdAt)}</span>
                        {idx === 0 && <span style={{ fontSize: 11, fontWeight: 700, background: 'var(--primary-light)', color: 'var(--primary)', padding: '2px 8px', borderRadius: 999 }}>최신</span>}
                        <span style={{ fontSize: 12, color: 'var(--sub)' }}>과제 {entry.insights.taskInsights?.length||0}개 · UX {entry.insights.uxInsights?.length||0}개</span>
                      </div>
                      <button onClick={e => { e.stopPropagation(); deleteInsightEntry(entry.id); }} style={{ padding: 6, background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', borderRadius: 6 }}
                        onMouseEnter={e=>e.currentTarget.style.color='#ef4444'} onMouseLeave={e=>e.currentTarget.style.color='var(--sub)'}>
                        <Icon d={ICONS.trash} size={14} />
                      </button>
                    </div>
                    {expandedInsightId === entry.id && (
                      <div style={{ padding: '0 18px 20px', borderTop: '1px solid var(--outline)' }}>
                        <div style={{ display: 'flex', flexDirection: 'column', gap: 24, paddingTop: 20 }}>
                          {[['과제 수준 인사이트', entry.insights.taskInsights, '#dbeafe', '#1d4ed8', 'bde'],
                            ['UX 인사이트 (재사용 가능)', entry.insights.uxInsights, '#f3e8ff', '#7e22ce', 'ux']].map(([title, items, tagBg, tagColor, k]) => (
                            <div key={k}>
                              <h4 style={{ fontSize: 14, fontWeight: 700, marginBottom: 12 }}>{title}</h4>
                              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2,1fr)', gap: 12 }}>
                                {(items||[]).map(ins => (
                                  <div key={ins.id} style={{ border: `1px solid ${tagBg}`, borderRadius: 14, padding: 16 }}>
                                    <div style={{ display: 'flex', gap: 10, marginBottom: 8 }}>
                                      <span style={{ fontSize: 18, flexShrink: 0 }}>{CAT_ICONS[ins.category]||'💡'}</span>
                                      <div style={{ flex: 1 }}>
                                        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', marginBottom: 6 }}>
                                          <span style={{ fontWeight: 700, fontSize: 13 }}>{ins.title}</span>
                                          <span style={{ background: tagBg, color: tagColor, fontSize: 11, padding: '2px 8px', borderRadius: 999, fontWeight: 600 }}>{ins.category}</span>
                                        </div>
                                        <p style={{ fontSize: 13, color: 'var(--dark)', lineHeight: 1.6, margin: 0 }}>{ins.content}</p>
                                      </div>
                                    </div>
                                    {ins.evidence && <div style={{ marginTop: 10, paddingLeft: 8, borderLeft: '2px solid var(--outline)' }}><p style={{ fontSize: 12, color: 'var(--sub)', fontStyle: 'italic', margin: 0 }}>"{ins.evidence}"</p></div>}
                                  </div>
                                ))}
                              </div>
                            </div>
                          ))}
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            ) : null}
          </div>
        </>
      )}

      {/* ── 드로어: 테스터 추가 / 수정 ── */}
      {drawerOpen && (
        <>
          <div style={{ position: 'fixed', inset: 0, background: 'rgba(26,26,46,0.3)', zIndex: 40 }} onClick={closeDrawer} />
          <div className="drawer">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '20px 24px', borderBottom: '1px solid var(--outline)' }}>
              <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>{editingTester ? '테스터 수정' : '테스터 추가'}</h3>
              <button onClick={closeDrawer} style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 4 }}><Icon d={ICONS.x} size={18} /></button>
            </div>
            <div style={{ flex: 1, overflowY: 'auto', padding: 24, display: 'flex', flexDirection: 'column', gap: 16 }}>
              <DField label="이름" req><input value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="예: 김지수" className="input-base" autoFocus /></DField>
              <DField label="나이대" req>
                <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                  {AGE_GROUPS.map(ag => <button key={ag} className={`pill-btn ${form.ageGroup===ag?'selected':''}`} onClick={()=>setForm({...form,ageGroup:ag})}>{ag}</button>)}
                </div>
              </DField>
              <DField label="성별" req>
                <div style={{ display: 'flex', gap: 6 }}>
                  {GENDERS.map(g => <button key={g} className={`pill-btn ${form.gender===g?'selected':''}`} onClick={()=>setForm({...form,gender:g})}>{g}</button>)}
                </div>
              </DField>
              <DField label="직업"><input value={form.job} onChange={e=>setForm({...form,job:e.target.value})} placeholder="예: UX 디자이너" className="input-base" /></DField>
              <DField label="디지털 리터러시(문해력)" req>
                <div style={{ display: 'flex', gap: 6 }}>
                  {LITERACY.map(l => <button key={l} className={`pill-btn ${form.digitalLiteracy===l?'selected':''}`} style={{ flex: 1 }} onClick={()=>setForm({...form,digitalLiteracy:l})}>{l}</button>)}
                </div>
              </DField>
              <DField label="특징 메모"><textarea value={form.memo} onChange={e=>setForm({...form,memo:e.target.value})} placeholder="특이사항이나 배경 정보를 자유롭게 기록하세요" rows={3} className="input-base" style={{ resize: 'none' }} /></DField>
            </div>
            <div style={{ padding: '16px 24px', borderTop: '1px solid var(--outline)', display: 'flex', gap: 10 }}>
              <button onClick={closeDrawer} className="btn-outline" style={{ flex: 1, justifyContent: 'center' }}>취소</button>
              <button onClick={submitDrawer} className="btn-primary" style={{ flex: 2, justifyContent: 'center', padding: '13px 0' }}>
                {editingTester ? '수정 완료' : '추가하기'}
              </button>
            </div>
          </div>
        </>
      )}
    </div>
  );
}

// ============================================================
// ANNOTATIONS TAB
// ============================================================
function AnnotationsTab({ test }) {
  const { updateTest, toast, getTest } = useApp();
  const [selIdx, setSelIdx] = useState(0);
  const [loading, setLoading] = useState(false);
  const [hovPin, setHovPin] = useState(null);

  const currentTest = getTest(test.id) || test;
  const ann = currentTest.annotations?.find(a=>a.imageIndex===selIdx);
  const allIns = currentTest.insights ? [...currentTest.insights.taskInsights, ...currentTest.insights.uxInsights] : [];

  const gen = async () => {
    if (!currentTest.insights) { toast('error', '테스트 탭에서 AI 인사이트를 먼저 생성해주세요.'); return; }
    if (!currentTest.images.length) { toast('error', '화면 이미지가 없습니다.'); return; }
    setLoading(true);
    try {
      const r = await apiGenerateAnnotations(GEMINI_API_KEY, currentTest.images[selIdx], allIns);
      const newAnn = { imageIndex: selIdx, points: r.map((p,i) => ({ id: `a${i}`, ...p })) };
      const updated = [...(currentTest.annotations||[]).filter(a=>a.imageIndex!==selIdx), newAnn];
      updateTest(test.id, { annotations: updated });
      toast('success', '어노테이션이 생성되었습니다.');
    } catch(e) { toast('error', e.message); } finally { setLoading(false); }
  };

  if (!currentTest.images.length) return (
    <div className="card"><div className="empty-state">
      <p style={{ fontSize: 14, color: 'var(--sub)' }}>화면 이미지가 없습니다.</p>
    </div></div>
  );

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <div className="card" style={{ padding: 20 }}>
        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between' }}>
          <div>
            <h3 style={{ fontSize: 15, fontWeight: 700, margin: '0 0 4px' }}>AI 개선 어노테이션</h3>
            <p style={{ fontSize: 13, color: 'var(--sub)', margin: 0 }}>{!currentTest.insights ? '결과 탭에서 AI 인사이트를 먼저 생성하세요.' : '이미지를 선택하고 어노테이션을 생성하세요.'}</p>
          </div>
          <button onClick={gen} disabled={loading||!currentTest.insights} className="btn-primary">
            {loading ? <Spinner size={14} /> : <Icon d={ICONS.bolt} size={14} />} AI 어노테이션 생성
          </button>
        </div>
        {currentTest.images.length > 1 && (
          <div style={{ display: 'flex', gap: 8, marginTop: 14, overflowX: 'auto', paddingBottom: 4 }}>
            {currentTest.images.map((img, i) => (
              <button key={i} onClick={() => setSelIdx(i)} style={{ flexShrink: 0, position: 'relative', border: `2px solid ${selIdx===i?'var(--primary)':'var(--outline)'}`, borderRadius: 10, overflow: 'hidden', background: 'none', padding: 0, cursor: 'pointer' }}>
                <img src={img} style={{ width: 72, height: 52, objectFit: 'cover', display: 'block' }} />
                {currentTest.annotations?.some(a=>a.imageIndex===i) && (
                  <div className="primary-bg" style={{ position: 'absolute', top: 4, right: 4, width: 16, height: 16, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
                    <Icon d={ICONS.check} size={10} className="text-white" />
                  </div>
                )}
              </button>
            ))}
          </div>
        )}
      </div>

      {loading ? <LoadingCard msg="AI가 개선 포인트를 분석 중입니다..." /> : (
        <div style={{ display: 'flex', gap: 16 }}>
          <div className="card" style={{ flex: 1, overflow: 'hidden' }}>
            <div style={{ position: 'relative' }}>
              <img src={currentTest.images[selIdx]} style={{ width: '100%', objectFit: 'contain', maxHeight: 580, display: 'block' }} />
              {ann?.points.map(pin => (
                <div key={pin.id} className="annotation-pin" style={{ left: `${pin.position.x}%`, top: `${pin.position.y}%` }}
                  onMouseEnter={() => setHovPin(pin.number)} onMouseLeave={() => setHovPin(null)}>
                  {pin.number}
                  {hovPin===pin.number && (
                    <div className="annotation-tooltip">
                      <p style={{ fontWeight: 700, fontSize: 12, marginBottom: 4 }}>{pin.title}</p>
                      <p style={{ fontSize: 11, color: 'var(--sub)', lineHeight: 1.5, margin: 0 }}>{pin.content}</p>
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
          {ann && ann.points.length > 0 && (
            <div style={{ width: 280, flexShrink: 0, display: 'flex', flexDirection: 'column', gap: 10 }}>
              <h4 style={{ fontSize: 13, fontWeight: 700, margin: '0 0 4px' }}>개선 포인트</h4>
              {ann.points.map(pt => (
                <div key={pt.id} className="card" style={{ padding: 14, cursor: 'pointer', border: `1px solid ${hovPin===pt.number?'var(--primary)':'var(--outline)'}`, boxShadow: hovPin===pt.number?'0 2px 10px rgba(9,171,73,0.15)':'' }}
                  onMouseEnter={() => setHovPin(pt.number)} onMouseLeave={() => setHovPin(null)}>
                  <div style={{ display: 'flex', gap: 8 }}>
                    <span className="primary-bg" style={{ width: 24, height: 24, borderRadius: '50%', color: 'white', fontSize: 11, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>{pt.number}</span>
                    <div>
                      <p style={{ fontWeight: 700, fontSize: 13, marginBottom: 4, margin: '0 0 4px' }}>{pt.title}</p>
                      <p style={{ fontSize: 12, color: 'var(--sub)', lineHeight: 1.5, margin: 0 }}>{pt.content}</p>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
          {!ann && (
            <div style={{ width: 280, flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
              <div style={{ textAlign: 'center' }}>
                <div className="primary-light-bg" style={{ width: 56, height: 56, borderRadius: 16, display: 'flex', alignItems: 'center', justifyContent: 'center', margin: '0 auto 12px' }}>
                  <Icon d={ICONS.msg} size={26} className="primary-text" />
                </div>
                <p style={{ fontSize: 13, color: 'var(--sub)' }}>이 화면의 어노테이션이 없습니다.</p>
              </div>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

const TABS = [
  { id:'guide', label:'사전 가이드', icon: ICONS.doc },
  { id:'test', label:'테스트 진행', icon: ICONS.users },
  { id:'annotations', label:'개선안', icon: ICONS.msg },
];

const NEXT_STATUS = { preparing: 'in_progress', in_progress: 'completed', completed: null };

function TestDetail() {
  const { testId, navigate, getTest, updateTest, deleteTest, toast } = useApp();
  const [tab, setTab] = useState('guide');
  const [showDel, setShowDel] = useState(false);
  const [showImgs, setShowImgs] = useState(false);

  const test = getTest(testId);
  if (!test) return (
    <Layout>
      <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', height: '80vh' }}>
        <p style={{ color: 'var(--sub)', fontSize: 16, marginBottom: 12 }}>테스트를 찾을 수 없습니다.</p>
        <button onClick={() => navigate('dashboard')} className="btn-outline" style={{ fontSize: 13 }}>대시보드로 돌아가기</button>
      </div>
    </Layout>
  );

  const nextStatus = NEXT_STATUS[test.status];

  const advance = () => {
    updateTest(test.id, { status: nextStatus });
    toast('success', `"${STATUS[nextStatus].label}"로 변경되었습니다.`);
  };
  const del = () => { deleteTest(test.id); navigate('dashboard'); toast('info', '테스트가 삭제되었습니다.'); };

  return (
    <Layout>
      <div style={{ padding: 32 }}>
        {/* Breadcrumb */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 13, color: 'var(--sub)', marginBottom: 20 }}>
          <button onClick={() => navigate('dashboard')} style={{ background: 'none', border: 'none', cursor: 'pointer', color: 'var(--sub)', fontSize: 13, padding: 0 }}
            onMouseEnter={e=>e.target.style.color='var(--primary)'} onMouseLeave={e=>e.target.style.color='var(--sub)'}>대시보드</button>
          <Icon d={ICONS.chevRight} size={14} />
          <span style={{ color: 'var(--dark)', fontWeight: 600 }}>{test.name}</span>
        </div>

        {/* Header */}
        <div style={{ display: 'flex', alignItems: 'flex-start', gap: 16, marginBottom: 24 }}>
          {test.images.length > 0 && (
            <button onClick={() => setShowImgs(true)} style={{ width: 72, height: 72, borderRadius: 12, overflow: 'hidden', border: '1px solid var(--outline)', flexShrink: 0, padding: 0, cursor: 'pointer' }}>
              <img src={test.images[0]} style={{ width: '100%', height: '100%', objectFit: 'cover' }} />
            </button>
          )}
          <div style={{ flex: 1 }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 6 }}>
              <h1 style={{ fontSize: 22, fontWeight: 800, color: 'var(--dark)', margin: 0 }}>{test.name}</h1>
              <span className="tag" style={{ background: STATUS[test.status].bg, color: STATUS[test.status].color, fontSize: 12 }}>{STATUS[test.status].label}</span>
            </div>
            <p style={{ fontSize: 13, color: 'var(--sub)', lineHeight: 1.6, maxWidth: 600, margin: '0 0 8px' }}>{test.purpose}</p>
            <div style={{ display: 'flex', gap: 16, fontSize: 12, color: 'var(--sub)' }}>
              <span>테스터 {test.testers.length}명</span>
              <span>이미지 {test.images.length}장</span>
              <span>{fmt(test.createdAt)}</span>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 8, flexShrink: 0 }}>
            {nextStatus && (
              <button onClick={advance} style={{ border: '1.5px solid var(--primary)', color: 'var(--primary)', background: 'white', borderRadius: 10, padding: '8px 14px', fontSize: 13, fontWeight: 600, cursor: 'pointer' }}>
                {STATUS[nextStatus].label}로 변경
              </button>
            )}
            <button onClick={() => setShowDel(true)} style={{ padding: '8px 10px', background: 'none', border: '1px solid var(--outline)', borderRadius: 10, cursor: 'pointer', color: 'var(--sub)' }}
              onMouseEnter={e=>{e.currentTarget.style.color='#ef4444';e.currentTarget.style.borderColor='#ef4444';}}
              onMouseLeave={e=>{e.currentTarget.style.color='var(--sub)';e.currentTarget.style.borderColor='var(--outline)';}}>
              <Icon d={ICONS.trash} size={15} />
            </button>
          </div>
        </div>

        {/* Tabs */}
        <div style={{ background: 'white', border: '1px solid var(--outline)', borderRadius: 14, padding: 5, display: 'inline-flex', gap: 4, marginBottom: 20 }}>
          {TABS.map(t => (
            <button key={t.id} onClick={() => setTab(t.id)} className={`tab-btn ${tab===t.id?'active':''}`}>
              <Icon d={t.icon} size={15} /> {t.label}
              {t.id==='testers' && test.testers.length > 0 && (
                <span style={{ width: 18, height: 18, borderRadius: '50%', fontSize: 10, fontWeight: 800, display: 'flex', alignItems: 'center', justifyContent: 'center', background: tab===t.id?'rgba(255,255,255,0.3)':'var(--primary-light)', color: tab===t.id?'white':'var(--primary)' }}>{test.testers.length}</span>
              )}
            </button>
          ))}
        </div>

        {tab==='guide' && <GuideTab test={test} />}
        {tab==='test' && <TestTab test={test} />}
        {tab==='annotations' && <AnnotationsTab test={test} />}
      </div>

      <Modal isOpen={showDel} onClose={() => setShowDel(false)} title="테스트 삭제" size="sm">
        <p style={{ fontSize: 14, color: 'var(--sub)', marginBottom: 20, lineHeight: 1.6 }}><strong style={{ color: 'var(--dark)' }}>{test.name}</strong>을(를) 삭제하면 모든 데이터가 함께 삭제됩니다. 이 작업은 되돌릴 수 없습니다.</p>
        <div style={{ display: 'flex', gap: 10 }}>
          <button onClick={() => setShowDel(false)} className="btn-outline" style={{ flex: 1, justifyContent: 'center' }}>취소</button>
          <button onClick={del} style={{ flex: 1, background: '#ef4444', color: 'white', border: 'none', borderRadius: 12, padding: '10px 0', fontSize: 14, fontWeight: 700, cursor: 'pointer' }}>삭제</button>
        </div>
      </Modal>

      <Modal isOpen={showImgs} onClose={() => setShowImgs(false)} title={`화면 이미지 (${test.images.length}장)`} size="lg">
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2,1fr)', gap: 12 }}>
          {test.images.map((img, i) => <img key={i} src={img} style={{ width: '100%', borderRadius: 12, border: '1px solid var(--outline)', objectFit: 'contain', maxHeight: 240 }} />)}
        </div>
      </Modal>
    </Layout>
  );
}

// INSIGHTS PAGE
// ============================================================
const ALL_CATS = Object.keys(CAT_ICONS);

function InsightsPage() {
  const { tests, navigate } = useApp();
  const [q, setQ] = useState('');
  const [cats, setCats] = useState([]);

  const all = useMemo(() => {
    const out = [];
    tests.forEach(t => {
      if (!t.insights) return;
      t.insights.taskInsights.forEach(ins => out.push({...ins, testId:t.id, testName:t.name, testDate:t.createdAt, type:'task'}));
      t.insights.uxInsights.forEach(ins => out.push({...ins, testId:t.id, testName:t.name, testDate:t.createdAt, type:'ux'}));
    });
    return out.sort((a,b) => new Date(b.testDate)-new Date(a.testDate));
  }, [tests]);

  const catCounts = useMemo(() => {
    const c = {};
    all.forEach(i => { c[i.category] = (c[i.category]||0)+1; });
    return c;
  }, [all]);

  const filtered = useMemo(() => all.filter(i => {
    const mq = !q || [i.title,i.content,i.evidence].some(t=>t.toLowerCase().includes(q.toLowerCase()));
    const mc = cats.length===0 || cats.includes(i.category);
    return mq && mc;
  }), [all, q, cats]);

  const toggle = c => setCats(prev => prev.includes(c) ? prev.filter(x=>x!==c) : [...prev,c]);

  return (
    <Layout>
      <div style={{ padding: 32 }}>
        <div style={{ marginBottom: 28 }}>
          <h1 style={{ fontSize: 22, fontWeight: 800, color: 'var(--dark)', margin: '0 0 4px' }}>UX 인사이트 아카이브</h1>
          <p style={{ fontSize: 13, color: 'var(--sub)', margin: 0 }}>모든 테스트에서 수집된 인사이트를 한눈에 확인하세요</p>
        </div>

        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 16, marginBottom: 24 }}>
          {[['전체 인사이트', all.length, 'var(--dark)'], ['UX 인사이트', all.filter(i=>i.type==='ux').length, 'var(--primary)'], ['분석 완료 테스트', tests.filter(t=>t.insights).length, '#1d4ed8']].map(([l,v,c]) => (
            <div key={l} className="card" style={{ padding: '18px 22px' }}>
              <p style={{ fontSize: 13, color: 'var(--sub)', marginBottom: 4 }}>{l}</p>
              <p style={{ fontSize: 28, fontWeight: 800, color: c, margin: 0 }}>{v}</p>
            </div>
          ))}
        </div>

        <div className="card" style={{ padding: 20, marginBottom: 20 }}>
          <div style={{ position: 'relative', marginBottom: 14 }}>
            <div style={{ position: 'absolute', left: 12, top: '50%', transform: 'translateY(-50%)', color: 'var(--sub)' }}><Icon d={ICONS.search} size={15} /></div>
            <input value={q} onChange={e=>setQ(e.target.value)} placeholder="인사이트 검색..." className="input-base" style={{ paddingLeft: 36 }} />
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 8 }}>
            <button className={`pill-btn ${cats.length===0?'selected':''}`} onClick={()=>setCats([])}>전체</button>
            {ALL_CATS.filter(c=>catCounts[c]).map(c => (
              <button key={c} className={`pill-btn ${cats.includes(c)?'selected':''}`} onClick={()=>toggle(c)} style={{ display: 'flex', alignItems: 'center', gap: 5 }}>
                <span>{CAT_ICONS[c]}</span>{c}<span style={{ opacity: 0.5 }}>({catCounts[c]})</span>
              </button>
            ))}
          </div>
        </div>

        {all.length === 0 ? (
          <div className="card"><div className="empty-state">
            <div className="primary-light-bg" style={{ width: 80, height: 80, borderRadius: 24, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 20 }}>
              <Icon d={ICONS.bulb} size={36} className="primary-text" />
            </div>
            <h3 style={{ fontSize: 17, fontWeight: 700, color: 'var(--dark)', marginBottom: 8 }}>아직 인사이트가 없어요</h3>
            <p style={{ fontSize: 13, color: 'var(--sub)', maxWidth: 280, lineHeight: 1.6 }}>테스트를 완료하고 AI 인사이트를 생성하면 이 곳에 자동으로 모입니다.</p>
          </div></div>
        ) : filtered.length === 0 ? (
          <p style={{ textAlign: 'center', color: 'var(--sub)', fontSize: 14, padding: '60px 0' }}>검색 조건에 맞는 인사이트가 없습니다.</p>
        ) : (
          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,1fr)', gap: 14 }}>
            {filtered.map(ins => (
              <div key={`${ins.testId}-${ins.id}`} className="card" style={{ padding: 18, cursor: 'pointer', transition: 'all 0.15s' }}
                onClick={() => navigate('test', ins.testId)}
                onMouseEnter={e=>{e.currentTarget.style.boxShadow='0 4px 16px rgba(0,0,0,0.09)';e.currentTarget.style.borderColor='var(--primary)';}}
                onMouseLeave={e=>{e.currentTarget.style.boxShadow='';e.currentTarget.style.borderColor='var(--outline)';}}>
                <div style={{ display: 'flex', gap: 10, marginBottom: 10 }}>
                  <span style={{ fontSize: 18, flexShrink: 0 }}>{CAT_ICONS[ins.category]||'💡'}</span>
                  <div style={{ flex: 1 }}>
                    <p style={{ fontWeight: 700, fontSize: 13, margin: '0 0 6px' }}>{ins.title}</p>
                    <div style={{ display: 'flex', gap: 5, flexWrap: 'wrap' }}>
                      <span className="tag" style={{ background: ins.type==='ux'?'#f3e8ff':'#dbeafe', color: ins.type==='ux'?'#7e22ce':'#1d4ed8', fontSize: 11 }}>{ins.type==='ux'?'UX 인사이트':'과제 인사이트'}</span>
                      <span className="tag" style={{ background: 'var(--bg)', color: 'var(--sub)', fontSize: 11 }}>{ins.category}</span>
                    </div>
                  </div>
                </div>
                <p style={{ fontSize: 13, color: 'var(--dark)', lineHeight: 1.6, margin: '0 0 10px' }} className="line-clamp-3">{ins.content}</p>
                {ins.evidence && <div style={{ paddingLeft: 8, borderLeft: '2px solid var(--outline)', marginBottom: 10 }}><p style={{ fontSize: 12, color: 'var(--sub)', fontStyle: 'italic', margin: 0 }} className="line-clamp-2">"{ins.evidence}"</p></div>}
                <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 11, color: 'var(--sub)', paddingTop: 10, borderTop: '1px solid var(--outline)' }}>
                  <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', marginRight: 8 }}>{ins.testName}</span>
                  <span style={{ flexShrink: 0 }}>{fmtShort(ins.testDate)}</span>
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </Layout>
  );
}

// ============================================================
// APP ROOT
// ============================================================
function App() {
  const { isAuth, page } = useApp();

  if (!isAuth) return <Landing />;
  if (page === 'dashboard') return <Dashboard />;
  if (page === 'test') return <TestDetail />;
  if (page === 'insights') return <InsightsPage />;
  return <Dashboard />;
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <AppProvider>
    <App />
  </AppProvider>
);
</script>
</body>
</html>
